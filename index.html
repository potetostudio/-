<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Runway v37 | Fullscreen Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 貼り付け画面 */
        #launchPad { position: fixed; inset: 0; background: #020617; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #launchPad.hidden { display: none; }
        .large-editor { width: 100%; max-width: 1000px; height: 60vh; background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 20px; color: #fff; font-family: monospace; outline: none; }

        /* ゲーム表示エリア */
        #previewContainer { width: 100vw; height: 100vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* 全画面切り替え時に消えるUI */
        .ui-element { transition: opacity 0.2s; }
        .ui-hidden { opacity: 0 !important; pointer-events: none !important; }

        /* フローティングUI */
        #topBar { position: fixed; top: 20px; left: 20px; right: 20px; z-index: 500; display: flex; justify-content: space-between; pointer-events: none; }
        #bottomBar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; z-index: 500; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; pointer-events: auto; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSZNHnNcui0Q1VkRshaHEuiMt8wDV2zGk",
            authDomain: "poteto0107-78af7.firebaseapp.com",
            projectId: "poteto0107-78af7",
            storageBucket: "poteto0107-78af7.firebasestorage.app",
            appId: "1:208184037315:web:c220bbc24c600a011bf776"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentCode = "";
        let isFullscreen = false;

        // 【復活】全画面モード切り替え
        window.toggleFullscreen = () => {
            isFullscreen = !isFullscreen;
            document.querySelectorAll('.ui-element').forEach(el => {
                el.classList.toggle('ui-hidden', isFullscreen);
            });
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                isFullscreen = false;
                document.querySelectorAll('.ui-element').forEach(el => el.classList.remove('ui-hidden'));
            }
        });

        window.addEventListener('load', async () => {
            lucide.createIcons();
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) {
                const snap = await getDoc(doc(db, "apps", id));
                if (snap.exists()) { currentCode = snap.data().code; document.getElementById('launchPad').classList.add('hidden'); render(); }
            }
        });

        window.init = () => {
            currentCode = document.getElementById('initialPaste').value;
            if (!currentCode) return;
            document.getElementById('launchPad').classList.add('hidden');
            render();
        };

        const render = () => { document.getElementById('preview').srcdoc = currentCode; };

        window.share = async () => {
            const ref = await addDoc(collection(db, "apps"), { code: currentCode, createdAt: new Date() });
            const url = `${window.location.origin}${window.location.pathname}?id=${ref.id}`;
            await navigator.clipboard.writeText(url);
            alert("URLをコピーしました");
        };

        window.aiFix = async () => {
            const key = localStorage.getItem('gemini_api_key') || prompt("Gemini APIキーを入力:");
            if (!key) return; localStorage.setItem('gemini_api_key', key);
            const promptStr = document.getElementById('aiInput').value;
            if (!promptStr) return;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `プレビューUIを含めず、中身だけを全画面で出力してください。指示：${promptStr}\nコード：\n${currentCode}` }] }] })
                });
                const data = await res.json();
                currentCode = data.candidates[0].content.parts[0].text.replace(/```html/gi, "").replace(/```/g, "").trim();
                render();
            } catch (e) { alert("AIエラー"); }
        };
    </script>
</head>
<body>

    <div id="launchPad">
        <textarea id="initialPaste" class="large-editor" placeholder="HTMLを貼り付け"></textarea>
        <button onclick="init()" class="mt-4 px-10 py-4 bg-indigo-600 rounded-xl font-bold">起動</button>
    </div>

    <div id="previewContainer">
        <iframe id="preview"></iframe>
    </div>

    <div id="topBar" class="ui-element">
        <div class="flex gap-2">
            <button onclick="location.reload()" class="glass p-3"><i data-lucide="refresh-cw"></i></button>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleFullscreen()" class="glass px-6 py-2 font-bold border-indigo-500">全画面表示</button>
            <button onclick="share()" class="glass px-6 py-2 font-bold">共有</button>
        </div>
    </div>

    <div id="bottomBar" class="ui-element">
        <div class="glass p-2 flex gap-2">
            <input id="aiInput" type="text" onkeypress="if(event.key==='Enter') aiFix()" class="flex-1 bg-transparent px-4 outline-none" placeholder="AI修正指示（EscでUI復帰）">
            <button onclick="aiFix()" class="bg-indigo-600 p-3 rounded-lg"><i data-lucide="sparkles"></i></button>
        </div>
    </div>

</body>
</html>
