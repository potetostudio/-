<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | v26 ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .mono { font-family: 'Fira Code', monospace; }

        /* サイドバー：初期状態は隠す(collapsed) */
        #historyPanel {
            width: 260px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background: #0f172a;
            border-right: 1px solid #1e293b;
            margin-left: -260px; /* 最初は左に追い出す */
            opacity: 0;
        }
        #historyPanel.visible {
            margin-left: 0;
            opacity: 1;
        }

        /* エディタとプレビューの境界 */
        .panel-container { gap: 1px; background-color: #1e293b; }

        /* ネオンボタン */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transition: all 0.2s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4); }
        .btn-primary:active { transform: translateY(0); }

        /* スクロールバー */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* プレビューiframeのコンテナ */
        .preview-wrapper { position: relative; background: #f1f5f9; border-radius: 12px; overflow: hidden; margin: 12px; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // 🔑 APIキーをここに入れてください
        const HARDCODED_API_KEY = ""; 
        // ==========================================

        const firebaseConfig = {
            apiKey: "AIzaSyBSZNHnNcui0Q1VkRshaHEuiMt8wDV2zGk",
            authDomain: "poteto0107-78af7.firebaseapp.com",
            projectId: "poteto0107-78af7",
            storageBucket: "poteto0107-78af7.firebasestorage.app",
            appId: "1:208184037315:web:c220bbc24c600a011bf776"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 実行機能（修正：srcdocを使用して確実に実行）
        window.runApp = () => {
            const code = document.getElementById('codeInput').value;
            const preview = document.getElementById('preview');
            if (!code) return;
            
            // scriptタグの実行を確実にするため srcdoc を更新
            preview.srcdoc = code;
            
            showStatus("アプリを実行中...", "emerald");
        };

        // 修正（Gemini 2.0 Flash）
        window.iterateWithAI = async () => {
            const prompt = document.getElementById('iteratePrompt').value.trim();
            const currentCode = document.getElementById('codeInput').value.trim();
            if (!prompt) return;

            setLoading(true);
            const fullPrompt = `以下のHTML/CSS/JSコードを修正してください。
指示：${prompt}

【ルール】
1. HTML, CSS, JSを全て含んだ1つのコードブロックとして出力してください。
2. 解説や説明文は一切含めないでください。
3. コード以外の文字は出力しないでください。

現在のコード：
${currentCode}`;

            try {
                const key = HARDCODED_API_KEY || localStorage.getItem('gemini_api_key');
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                });
                const data = await response.json();
                let code = data.candidates[0].content.parts[0].text;
                code = code.replace(/```html/gi, "").replace(/```/g, "").trim();

                document.getElementById('codeInput').value = code;
                window.runApp(); // 修正後に自動実行
                addToHistory(prompt, code);
                document.getElementById('iteratePrompt').value = '';
            } catch (e) {
                console.error(e);
                alert("APIエラーが発生しました。キーを確認してください。");
            }
            setLoading(false);
        };

        const setLoading = (loading) => {
            const btn = document.getElementById('iterateBtn');
            btn.disabled = loading;
            btn.innerHTML = loading ? '<i data-lucide="loader-2" class="animate-spin w-4 h-4"></i>' : '適用';
            showStatus(loading ? "AIが構築中..." : "待機中", loading ? "indigo" : "emerald");
            lucide.createIcons();
        };

        const showStatus = (text, color) => {
            const statusEl = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            statusText.innerText = text;
            statusEl.className = `w-2 h-2 rounded-full bg-${color}-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]`;
        };

        // UI制御
        window.toggleHistory = () => {
            document.getElementById('historyPanel').classList.toggle('visible');
        };

        window.downloadCode = () => {
            const code = document.getElementById('codeInput').value;
            const blob = new Blob([code], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my-ai-app.html';
            a.click();
        };

        window.createShareUrl = async () => {
            const code = document.getElementById('codeInput').value;
            if (!code) return;
            const docRef = await addDoc(collection(db, "apps"), { code, createdAt: new Date() });
            navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?id=${docRef.id}`);
            alert("共有URLをコピーしました！");
        };

        const addToHistory = (prompt, code) => {
            const history = JSON.parse(localStorage.getItem('v26_history') || '[]');
            history.unshift({ id: Date.now(), prompt, code });
            localStorage.setItem('v26_history', JSON.stringify(history.slice(0, 20)));
            renderHistory();
        };

        window.renderHistory = () => {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('v26_history') || '[]');
            list.innerHTML = history.map(h => `
                <div class="p-3 mb-2 rounded-xl bg-slate-800/40 border border-slate-700/50 hover:border-indigo-500 cursor-pointer transition-all group" 
                     onclick="document.getElementById('codeInput').value=\`${h.code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`;window.runApp();">
                    <div class="text-slate-200 text-xs font-bold truncate group-hover:text-indigo-300">${h.prompt}</div>
                    <div class="text-slate-500 text-[10px] mt-1">${new Date(h.id).toLocaleTimeString()}</div>
                </div>
            `).join('');
        };

        window.addEventListener('load', () => { 
            lucide.createIcons(); 
            renderHistory();
            // 初回実行
            if(document.getElementById('codeInput').value) window.runApp();
        });
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="h-14 border-b border-slate-800 bg-slate-950 flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-4">
            <button onclick="toggleHistory()" class="p-2.5 hover:bg-slate-800 rounded-xl text-slate-400 transition-colors">
                <i data-lucide="history" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center gap-2.5">
                <div class="flex -space-x-1">
                    <div class="w-2.5 h-2.5 bg-indigo-500 rounded-full border-2 border-slate-950"></div>
                    <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full border-2 border-slate-950"></div>
                </div>
                <h1 class="text-sm font-bold tracking-tight text-white uppercase italic">Runway <span class="text-indigo-500">v26</span></h1>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="downloadCode()" class="p-2 text-slate-400 hover:text-white transition-colors" title="HTMLを保存">
                <i data-lucide="download" class="w-5 h-5"></i>
            </button>
            <button onclick="createShareUrl()" class="px-4 py-1.5 bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold rounded-lg transition-all border border-slate-700">
                共有リンク
            </button>
            <button onclick="window.runApp()" class="px-5 py-1.5 btn-primary text-white text-xs font-bold rounded-lg flex items-center gap-2">
                <i data-lucide="play" class="w-3.5 h-3.5 fill-current"></i> 実行
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside id="historyPanel" class="flex flex-col z-40">
            <div class="p-5 flex items-center justify-between border-b border-slate-800">
                <span class="text-[10px] font-black text-slate-500 tracking-[2px]">VERSIONS</span>
                <button onclick="toggleHistory()" class="text-slate-500 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto p-4">
                </div>
        </aside>

        <section id="editorPanel" class="w-[480px] flex flex-col bg-slate-900/50 shrink-0 border-r border-slate-800">
            <div class="flex-1 flex flex-col min-h-0">
                <div class="h-9 px-4 flex items-center justify-between bg-slate-950/50 border-b border-slate-800">
                    <span class="text-[10px] font-bold text-slate-500 mono">index.html</span>
                    <span class="text-[9px] px-1.5 py-0.5 rounded bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">EDITABLE</span>
                </div>
                <textarea id="codeInput" 
                    class="flex-1 p-6 bg-transparent text-indigo-100 mono text-[12px] leading-relaxed outline-none resize-none"
                    placeholder="ここにコードを貼り付けるか、下のボックスに修正指示を書いてください..."
                    oninput="window.runApp()"></textarea>
            </div>

            <div class="p-5 bg-slate-950 border-t border-slate-800">
                <div class="flex items-center gap-2 mb-3 px-1">
                    <i data-lucide="sparkles" class="w-3.5 h-3.5 text-emerald-400"></i>
                    <span class="text-[10px] font-bold text-emerald-400 tracking-widest uppercase">AI Assistant</span>
                </div>
                <div class="flex gap-2 p-1.5 bg-slate-900 rounded-xl border border-slate-700/50 focus-within:border-indigo-500 transition-all shadow-inner">
                    <input id="iteratePrompt" type="text" 
                        class="flex-1 bg-transparent border-none text-sm text-slate-200 px-3 outline-none" 
                        placeholder="例：もっとかっこいいボタンにして">
                    <button id="iterateBtn" onclick="iterateWithAI()" 
                        class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-lg text-xs font-bold transition-all min-w-[70px] shadow-lg shadow-indigo-500/20">
                        適用
                    </button>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col bg-[#020617] relative">
            <div class="preview-wrapper flex-1 shadow-2xl">
                <iframe id="preview" class="w-full h-full border-none bg-white"></iframe>
            </div>
            
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 px-4 py-2 bg-slate-950/90 backdrop-blur-xl border border-slate-800 rounded-full flex items-center gap-3 shadow-2xl">
                <div id="statusIndicator" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                <span id="statusText" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ready</span>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 px-4 py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg opacity-0 transition-all pointer-events-none z-50"></div>

</body>
</html>
