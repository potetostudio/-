<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | AI Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase設定 (以前と同じ)
        const firebaseConfig = {
            apiKey: "AIzaSyBf-upO8KlxJCg1QijjBOo7Vp9J44zz80M",
            authDomain: "poteto0107-c6aa7.firebaseapp.com",
            projectId: "poteto0107-c6aa7",
            storageBucket: "poteto0107-c6aa7.firebasestorage.app",
            messagingSenderId: "1077874289264",
            appId: "1:1077874289264:web:da6c74c9b49ff49ecda2b5",
            measurementId: "G-STKJDT4Q9Z"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AI生成ロジック ---
        window.generateWithAI = async () => {
            const prompt = document.getElementById('aiPrompt').value;
            const apiKey = localStorage.getItem('gemini_api_key');

            if (!apiKey) {
                alert("先に右上の設定からGemini APIキーを入力してください");
                return;
            }
            if (!prompt) return;

            showToast("AIがコードを生成中...");
            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.innerText = "生成中...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt + "。出力はHTML/CSS/JSを1つのファイルにまとめた完成コードのみを返してください。解説はいりません。```html などのタグも不要です。" }] }]
                    })
                });

                const data = await response.json();
                let code = data.candidates[0].content.parts[0].text;
                
                // 余計なマークダウンを削除
                code = code.replace(/```html/g, "").replace(/```/g, "").trim();

                document.getElementById('codeInput').value = code;
                window.runApp(false); // プレビュー実行（エディタは消さない）
                showToast("生成完了！");
            } catch (e) {
                console.error(e);
                showToast("生成に失敗しました。キーを確認してください。");
            } finally {
                btn.disabled = false;
                btn.innerText = "生成";
            }
        };

        // 基本機能
        window.runApp = (forceRemove = true) => {
            const code = document.getElementById('codeInput').value;
            if (!code) return;
            const previewFrame = document.getElementById('preview');
            const doc = previewFrame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
            if (forceRemove) document.getElementById('editorPanel').style.display = 'none';
        };

        window.saveKey = () => {
            const key = document.getElementById('apiKeyInput').value;
            localStorage.setItem('gemini_api_key', key);
            document.getElementById('settingsModal').classList.add('hidden');
            showToast("キーを保存しました");
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('opacity-100');
            setTimeout(() => toast.classList.remove('opacity-100'), 3000);
        };

        window.addEventListener('load', () => lucide.createIcons());
    </script>
</head>
<body class="h-screen flex flex-col bg-slate-50">

    <nav class="bg-white border-b px-4 py-2 flex justify-between items-center shadow-sm z-30">
        <div class="flex items-center gap-2">
            <span class="text-xl">🚀</span>
            <h1 class="text-sm font-bold text-indigo-600 uppercase tracking-tighter">AI Runway v2</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('settingsModal').classList.remove('hidden')" class="p-2 text-slate-400 hover:text-slate-600">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
            <button onclick="runApp(true)" class="px-4 py-1.5 bg-indigo-600 text-white text-xs font-bold rounded-lg">全画面で実行</button>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        <div id="editorPanel" class="w-[380px] h-full bg-slate-900 flex flex-col border-r border-slate-700 shrink-0">
            <div class="p-4 border-b border-slate-700 bg-slate-800">
                <label class="text-[10px] text-slate-400 font-bold uppercase block mb-2">AI 指示出し</label>
                <div class="flex gap-2">
                    <input id="aiPrompt" type="text" class="flex-1 bg-slate-700 text-white text-xs p-2 rounded border border-slate-600 focus:outline-none focus:border-indigo-500" placeholder="例：テトリスを作って">
                    <button id="genBtn" onclick="generateWithAI()" class="px-3 py-1 bg-indigo-500 text-white text-xs font-bold rounded hover:bg-indigo-400">生成</button>
                </div>
            </div>
            <div class="flex-1 flex flex-col">
                <div class="bg-slate-800 px-4 py-2 text-[10px] text-slate-400 font-bold">GENERATED CODE</div>
                <textarea id="codeInput" class="flex-1 w-full p-4 bg-slate-900 text-indigo-300 font-mono text-[11px] focus:outline-none resize-none" placeholder="ここにコードが表示されます"></textarea>
            </div>
        </div>

        <div class="flex-1 h-full bg-white">
            <iframe id="preview" class="w-full h-full border-none"></iframe>
        </div>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-80">
            <h2 class="text-lg font-bold mb-4 text-slate-800">Gemini API設定</h2>
            <p class="text-xs text-slate-500 mb-4">Google AI Studioで発行したキーを入力してください。ブラウザ内のみに保存されます。</p>
            <input id="apiKeyInput" type="password" class="w-full p-2 border rounded text-sm mb-4" placeholder="AIzaSy...">
            <div class="flex justify-end gap-2">
                <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="px-4 py-2 text-xs text-slate-500">閉じる</button>
                <button onclick="saveKey()" class="px-4 py-2 bg-indigo-600 text-white text-xs font-bold rounded shadow">保存</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 text-white text-xs rounded-full opacity-0 transition-all duration-300 pointer-events-none z-50"></div>

</body>
</html>
