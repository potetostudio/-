<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Poteto Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090e;--s1:#0f1117;--s2:#171b24;--s3:#1e2330;--s4:#2a3040;
  --br:rgba(255,255,255,0.08);--brh:rgba(255,255,255,0.16);
  --ac:#6d5aef;--ac2:#9b8bff;--acg:rgba(109,90,239,0.3);
  --gr:#2ea043;--rd:#da3633;
  --t1:#f0f3f8;--t2:#9ba6b8;--t3:#4a5568;
  --f:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --nav:52px;--r:12px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--f);overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
#app{display:flex;flex-direction:column;height:100%}
.view{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.view.active{display:flex}

/* ── Nav ── */
#nav{height:var(--nav);background:var(--s1);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:20}
.logo{font-size:15px;font-weight:700;color:var(--ac2);letter-spacing:-0.02em;margin-right:auto;display:flex;align-items:center;gap:7px}
.logo-tag{font-size:10px;background:var(--ac);color:white;padding:2px 6px;border-radius:4px;font-weight:600}
.nb{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--br);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--f);transition:all .15s;white-space:nowrap}
.nb:hover{border-color:var(--brh);color:var(--t1);background:var(--s2)}
.nb.pri{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600;box-shadow:0 0 20px var(--acg)}
.nb.pri:hover{opacity:.88}
.nb svg{width:14px;height:14px;flex-shrink:0}
.ni{width:34px;height:34px;border-radius:8px;border:1px solid var(--br);background:var(--s2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ni:hover{border-color:var(--ac);color:var(--ac2)}
.ni svg{width:14px;height:14px}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:9px 18px;background:var(--s3);border:1px solid var(--brh);border-radius:20px;font-size:12px;color:var(--t1);opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1}

/* ══ GALLERY ══ */
#g-search{padding:12px 16px;border-bottom:1px solid var(--br);background:var(--s1);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sw{position:relative;flex:1}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--t3);pointer-events:none}
#skw{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:7px 10px 7px 30px;font-size:12px;color:var(--t1);outline:none;font-family:var(--f);transition:border-color .15s}
#skw:focus{border-color:var(--ac)}
#skw::placeholder{color:var(--t3)}
#g-body{flex:1;overflow-y:auto;padding:20px}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.gc{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.gc:hover{border-color:rgba(109,90,239,.5);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.gc-thumb{height:130px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:34px;position:relative;overflow:hidden}
.gc-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 50%,rgba(109,90,239,.08))}
.gc-body{padding:11px 12px}
.gc-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.gc-meta{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--br)}
.gc-author{display:flex;align-items:center;gap:5px;flex:1;min-width:0;overflow:hidden}
.gc-av{width:16px;height:16px;border-radius:50%;background:var(--s4);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.gc-av img{width:100%;height:100%;object-fit:cover}
.gc-name{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-likes{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--rd);flex-shrink:0}
.gc-del{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(0,0,0,.55);border:none;border-radius:6px;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.gc:hover .gc-del{opacity:1}
.gc-del:hover{background:var(--rd);color:white}
.gc-del svg{width:11px;height:11px}
#g-empty{display:none;text-align:center;padding:80px 20px;color:var(--t3)}
#g-empty svg{margin:0 auto 16px;opacity:.3;display:block}

/* ══ LAUNCHPAD ══ */
#launchpad{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:22px;background:radial-gradient(ellipse at 50% 0%,rgba(109,90,239,.08) 0%,transparent 70%);overflow-y:auto}
.lp-head{text-align:center}
.lp-head h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#f0f3f8,var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.lp-head p{font-size:13px;color:var(--t2)}
.lp-ai{width:100%;max-width:600px;background:rgba(109,90,239,.08);border:1px solid rgba(109,90,239,.25);border-radius:var(--r);padding:16px}
.lp-ai-lbl{font-size:11px;font-weight:600;color:var(--ac2);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.lp-ai-lbl svg{width:13px;height:13px}
.lp-row{display:flex;gap:8px}
#agi{flex:1;background:var(--bg);border:1px solid var(--brh);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--t1);outline:none;font-family:var(--f);transition:border-color .15s}
#agi:focus{border-color:var(--ac)}
#agi::placeholder{color:var(--t3)}
#agb{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-family:var(--f);font-size:13px;font-weight:600;color:white;white-space:nowrap;background:linear-gradient(135deg,var(--ac),var(--ac2));box-shadow:0 4px 16px var(--acg);transition:opacity .15s}
#agb:hover{opacity:.88}
#agb:disabled{opacity:.45;cursor:not-allowed}
#ag-status{display:none;margin-top:10px;font-size:11px;color:var(--ac2);align-items:center;gap:6px}
.spin{animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lp-div{width:100%;max-width:600px;display:flex;align-items:center;gap:12px}
.lp-div::before,.lp-div::after{content:'';flex:1;height:1px;background:var(--br)}
.lp-div span{font-size:11px;color:var(--t3)}
#lp-code{width:100%;max-width:600px;height:140px;background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:12px;font-family:var(--fm);font-size:11px;line-height:1.6;color:#9b8bff;outline:none;resize:none;tab-size:2;transition:border-color .15s}
#lp-code:focus{border-color:var(--ac)}
#lp-code::placeholder{color:var(--t3)}
.lp-btns{display:flex;gap:10px}
.lb{padding:10px 28px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f);border:none;transition:all .15s}
.lb.main{background:linear-gradient(135deg,var(--ac),var(--ac2));color:white;box-shadow:0 4px 20px var(--acg)}
.lb.main:hover{opacity:.88}
.lb.sub{background:var(--s2);border:1px solid var(--br);color:var(--t2)}
.lb.sub:hover{border-color:var(--brh);color:var(--t1)}

/* ══ WORKSPACE ══ */
#workspace{flex:1;display:none;flex-direction:column;min-height:0;position:relative;overflow:hidden}
#wsbar{height:46px;background:var(--s1);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.sep{width:1px;height:20px;background:var(--br);margin:0 2px;flex-shrink:0}
.dev-group{display:flex;gap:2px;padding:3px;background:var(--s2);border:1px solid var(--br);border-radius:8px}
.dev-btn{padding:4px 8px;border-radius:6px;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.dev-btn svg{width:13px;height:13px}
#ws-main{flex:1;display:flex;min-height:0;overflow:hidden}
#pw{flex:1;display:flex;align-items:center;justify-content:center;background:#080810;min-width:0;overflow:hidden;padding:0}
#dc{transition:all .3s cubic-bezier(.16,1,.3,1)}
#dc.device-desktop{width:100%;height:100%}
#dc.device-tablet{width:1024px;height:680px;max-width:95%;max-height:95%;border-radius:16px;border:8px solid var(--s3);box-shadow:0 16px 48px rgba(0,0,0,.6)}
#dc.device-mobile{width:780px;height:380px;max-width:95%;max-height:95%;border-radius:28px;border:8px solid var(--s3);box-shadow:0 16px 48px rgba(0,0,0,.6)}
#dc iframe{width:100%;height:100%;border:none;background:white;display:block}
#dc.device-tablet iframe,#dc.device-mobile iframe{border-radius:inherit}

/* コードパネル — display:none で完全に非表示 */
#cp{width:400px;min-width:400px;display:none;flex-direction:column;background:var(--s1);border-left:1px solid var(--br);flex-shrink:0}
#cp-hdr{padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px;flex-shrink:0}
#cp-hdr span{font-size:11px;font-weight:600;color:var(--t2)}
#cp-meta{font-size:10px;color:var(--t3);margin-left:auto}
.xbtn{background:none;border:none;color:var(--t3);cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center;transition:all .15s}
.xbtn:hover{background:var(--s4);color:var(--t1)}
.xbtn svg{width:14px;height:14px}
#cw{flex:1;position:relative;overflow:hidden}
#cl{position:absolute;top:0;left:0;width:38px;height:100%;background:var(--bg);border-right:1px solid var(--br);padding:12px 0;overflow:hidden;user-select:none;text-align:right;z-index:2}
.ln{display:block;padding-right:7px;font-size:10px;line-height:15px;color:var(--t3);font-family:var(--fm)}
#ch{position:absolute;inset:0;padding:12px 12px 12px 50px;white-space:pre;overflow:hidden;pointer-events:none;background:var(--bg);z-index:1;margin:0}
#ch code{background:none!important;padding:0!important;font-size:10px!important;line-height:15px!important;font-family:var(--fm)!important}
#ct{position:absolute;inset:0;padding:12px 12px 12px 50px;background:transparent;color:transparent;caret-color:#e6edf3;font-family:var(--fm);font-size:10px;line-height:15px;border:none;outline:none;resize:none;tab-size:2;z-index:3}
#cp-foot{padding:8px;border-top:1px solid var(--br);flex-shrink:0}
#cp-foot button{width:100%;padding:7px;background:var(--ac);color:white;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);transition:opacity .15s}
#cp-foot button:hover{opacity:.88}

/* AI バー */
#aibar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:520px;z-index:30}
#aibar-in{background:rgba(12,13,20,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--brh);border-radius:14px;padding:7px;display:flex;align-items:center;gap:7px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#aibar-in>svg{color:var(--ac2);flex-shrink:0;width:15px;height:15px;margin:0 4px}
#ai-inp{flex:1;background:transparent;border:none;outline:none;font-size:12px;color:var(--t1);font-family:var(--f)}
#ai-inp::placeholder{color:var(--t3)}
#ai-snd{padding:7px 14px;border-radius:9px;border:none;cursor:pointer;font-family:var(--f);font-size:12px;font-weight:600;color:white;background:linear-gradient(135deg,var(--ac),var(--ac2));box-shadow:0 2px 12px var(--acg);transition:opacity .15s;white-space:nowrap}
#ai-snd:hover{opacity:.88}
#ai-snd:disabled{opacity:.4;cursor:not-allowed}

/* AI Thinking */
#thinking{display:none;position:absolute;inset:0;z-index:50;background:rgba(8,9,14,.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;gap:16px}
#thinking.on{display:flex}
.tr{width:56px;height:56px;border-radius:50%;border:2px solid var(--br);position:relative}
.tr::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid transparent;border-top-color:var(--ac);border-right-color:var(--ac2);animation:spin 1s linear infinite}
.tm{font-size:13px;color:var(--t2);display:flex;align-items:center;gap:6px}
.tc{display:inline-block;width:2px;height:14px;background:var(--ac);animation:blink .9s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* 履歴パネル */
#hp{position:absolute;top:0;right:0;width:280px;height:100%;background:var(--s1);border-left:1px solid var(--br);z-index:40;display:none;flex-direction:column}
#hp.on{display:flex}
.hh{padding:12px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hh span{font-size:13px;font-weight:600}
.vc{padding:9px 12px;border-bottom:1px solid var(--br);cursor:pointer;transition:background .12s}
.vc:hover{background:var(--s2)}
.vc.cur{border-left:2px solid var(--ac)}
.vt{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.vm{display:flex;align-items:center;justify-content:space-between}
.vtime{font-size:10px;color:var(--t3)}
.vbs{display:flex;gap:4px}
.vb{padding:2px 7px;background:var(--s3);border:1px solid var(--br);border-radius:4px;font-size:10px;color:var(--t2);cursor:pointer;font-family:var(--f);transition:all .12s}
.vb:hover{border-color:var(--ac);color:var(--ac2)}
.vb.ok{background:var(--ac);border-color:var(--ac);color:white}
.vb.ok:hover{opacity:.88}

/* ══ APP VIEW ══ */
#view-app{position:relative;background:#000}
#app-pv{position:absolute;inset:0;width:100%;height:100%;border:none;background:white}
#hud{position:absolute;top:12px;right:12px;z-index:10;display:flex;align-items:center;gap:6px}
.hp2{display:flex;align-items:center;gap:5px;padding:5px 11px;background:rgba(10,10,18,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:20px;font-size:12px;font-weight:500;color:#f0f3f8;cursor:pointer;transition:all .15s;white-space:nowrap}
.hp2:hover{background:rgba(20,20,36,.95)}
.hp2 svg{width:13px;height:13px;flex-shrink:0}
.hi{width:32px;height:32px;border-radius:50%;background:rgba(10,10,18,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#f0f3f8;cursor:pointer;transition:all .15s}
.hi:hover{background:rgba(20,20,36,.95)}
.hi svg{width:14px;height:14px}

/* ══ MODALS ══ */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mb{background:var(--s2);border:1px solid var(--brh);border-radius:16px;width:100%;max-width:400px;padding:24px;box-shadow:0 24px 64px rgba(0,0,0,.6);animation:fu .2s ease both}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.mt{font-size:15px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.mc{background:none;border:none;color:var(--t3);cursor:pointer;font-size:20px;line-height:1}
.mc:hover{color:var(--t1)}
.fl{font-size:11px;font-weight:600;color:var(--t2);display:block;margin-bottom:6px}
.fi{width:100%;background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--t1);outline:none;font-family:var(--f);transition:border-color .15s;margin-bottom:14px}
.fi:focus{border-color:var(--ac)}
.fi::placeholder{color:var(--t3)}
.fi.mono{font-family:var(--fm);font-size:12px}
.mnote{font-size:11px;color:var(--t2);background:rgba(109,90,239,.08);border:1px solid rgba(109,90,239,.2);border-radius:8px;padding:10px 12px;margin-bottom:14px;line-height:1.7}
.mnote a{color:var(--ac2);text-decoration:underline}
.mbs{display:flex;gap:8px;margin-top:4px}
.mbb{flex:1;padding:10px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all .15s;border:none}
.mbb.can{background:var(--s3);border:1px solid var(--br);color:var(--t2)}
.mbb.can:hover{color:var(--t1)}
.mbb.ok{background:linear-gradient(135deg,var(--ac),var(--ac2));color:white;box-shadow:0 4px 16px var(--acg)}
.mbb.ok:hover{opacity:.88}
.urlr{display:flex;gap:6px;margin-bottom:12px}
.urld{flex:1;background:var(--bg);border:1px solid var(--br);border-radius:8px;padding:8px 10px;font-size:10px;font-family:var(--fm);color:var(--ac2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cpb{padding:7px 12px;background:var(--ac);color:white;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all .15s;white-space:nowrap}
.cpb:hover{opacity:.88}
.cpb.done{background:var(--gr)}
.avr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.avc{width:52px;height:52px;border-radius:50%;background:var(--s3);border:2px dashed var(--br);cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s}
.avc:hover{border-color:var(--ac)}
.avc img{width:100%;height:100%;object-fit:cover;display:none}
.ks{font-size:10px;color:var(--gr);margin-top:4px;height:14px}
.div1{height:1px;background:var(--br);margin-bottom:14px}

@media(max-width:600px){
  .gg{grid-template-columns:1fr 1fr;gap:10px}
  #g-body{padding:12px}
  .lp-row{flex-direction:column}
  #agb{width:100%}
  .lp-btns{flex-direction:column}
  .lb{text-align:center}
  #cp{width:100%;min-width:0;position:absolute;inset:0;z-index:35}
  #aibar{width:calc(100% - 20px)}
  .wslbl{display:none}
}
</style>
</head>
<body>
<div id="app">
  <!-- NAV -->
  <div id="nav">
    <div class="logo">🚀 Poteto <span class="logo-tag">STUDIO</span></div>
    <div id="nbg" style="display:flex;align-items:center;gap:8px">
      <button class="nb" onclick="openSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

var aiFilterIds = null; // null = フィルターなし

function toggleAISearch() {
    var bar = document.getElementById('ai-search-bar');
    var btn = document.getElementById('ai-search-btn');
    var isOpen = bar.style.display === 'flex';
    bar.style.display = isOpen ? 'none' : 'flex';
    btn.style.background = isOpen ? 'var(--s2)' : 'rgba(109,90,239,0.15)';
    btn.style.borderColor = isOpen ? 'var(--br)' : 'var(--ac)';
    btn.style.color = isOpen ? 'var(--t2)' : 'var(--ac2)';
    if (!isOpen) {
        setTimeout(function(){ document.getElementById('ai-search-input').focus(); }, 50);
    }
}

async function runAISearch() {
    var query = document.getElementById('ai-search-input').value.trim();
    if (!query) return;
    if (apps.length === 0) { T('No apps'); return; }
    if (!apiKey) { openSettings(); T('Set API key first'); return; }
    T('AI searching...',6000);
    var appList = apps.map(function(a,i){ return (i+1)+'. id='+a.id+' '+a.title+' '+a.code.slice(0,100); }).join(' | ');
    var prompt = 'From this app list: ' + appList + ' --- find apps matching: ' + query + ' --- return ONLY a JSON array of matching IDs like [123,456]. No text, no markdown.';
    var result = await callG(prompt);
    if (!result) return;
    try {
        var ids = JSON.parse(result.replace(/```[\s\S]*?```/g,'').trim()).map(Number);
        aiFilterIds = ids; renderGallery(); T('AI: '+ids.length+' found');
    } catch(e) { T('Parse error'); }

}

function clearAISearch() {
    aiFilterIds = null;
    document.getElementById('ai-search-input').value = '';
    renderGallery();
    T('フィルターをクリアしました');
}

// Gallery

  var q=(document.getElementById('skw').value||'').toLowerCase();
  var list=apps.filter(function(a){
    if(aiFilterIds !== null && !aiFilterIds.includes(a.id)) return false;
    return !q||a.title.toLowerCase().includes(q);
  });
  document.getElementById('gcnt').textContent=apps.length+'件';
  var g=document.getElementById('gg'),em=document.getElementById('g-empty');
  g.innerHTML='';
  if(!list.length){em.style.display='block';return;}
  em.style.display='none';
  list.slice().reverse().forEach(function(a,i){
    var el=document.createElement('div');el.className='gc';
    el.onclick=function(){openApp(a.id);};
    el.innerHTML='<div class="gc-thumb">'+ICONS[i%ICONS.length]+'</div>'+
      '<div class="gc-body">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px">'+
          '<div class="gc-title" style="flex:1">'+E(a.title)+'</div>'+
          '<button class="gc-del" onclick="event.stopPropagation();delApp('+a.id+')" title="削除">'+
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'+
          '</button>'+
        '</div>'+
        '<div class="gc-meta">'+
          '<div class="gc-author">'+
            (a.avatar?'<div class="gc-av"><img src="'+a.avatar+'"></div>':'<div class="gc-av"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>')+
            '<span class="gc-name">'+E(a.author||'匿名')+'</span>'+
          '</div>'+
          '<div class="gc-likes">'+
            '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>'+
            a.likes+
          '</div>'+
        '</div>'+
      '</div>';
    g.appendChild(el);
  });
}
function delApp(id){
  if(!confirm('削除しますか？'))return;
  apps=apps.filter(function(a){return a.id!==id;});
  localStorage.setItem('b44_apps',JSON.stringify(apps));
  renderGallery();T('削除しました');
}

// App View
function openApp(id){
  var a=apps.find(function(x){return x.id===id;});if(!a)return;
  curAppId=id;
  document.getElementById('app-ttl').textContent=a.title;
  document.getElementById('lcnt').textContent=a.likes;
  document.getElementById('lico').setAttribute('fill','none');
  document.getElementById('app-pv').srcdoc=a.code;
  nav('app');
}
function likeApp(){
  var a=apps.find(function(x){return x.id===curAppId;});if(!a)return;
  a.likes++;localStorage.setItem('b44_apps',JSON.stringify(apps));
  document.getElementById('lcnt').textContent=a.likes;
  document.getElementById('lico').setAttribute('fill','currentColor');
}
function toggleAFS(){
  isFsA=!isFsA;
  document.getElementById('hud').style.display=isFsA?'none':'flex';
  document.getElementById('afsexit').style.display=isFsA?'block':'none';
}

// Studio
function resetS(){
  document.getElementById('launchpad').style.display='flex';
  document.getElementById('workspace').style.display='none';
  document.getElementById('lp-code').value='';
  document.getElementById('agi').value='';
  document.getElementById('ag-status').style.display='none';
  document.getElementById('hp').classList.remove('on');
  hideCP();
  vers=[];cur='';
}
function launchStudio(){
  var c=document.getElementById('lp-code').value.trim();
  if(!c){T('コードを入力してください');return;}
  startWS(c,'貼り付けコード','original');
}
function startWS(code,label,type){
  cur=code;
  document.getElementById('launchpad').style.display='none';
  document.getElementById('workspace').style.display='flex';
  document.getElementById('sif').srcdoc=cur;
  vers=[{id:Date.now(),code:cur,label:label,type:type||'original'}];
  renderHist();
  hideCP(); // ← 確実にコードパネルを非表示
}
function exitWorkspace(){nav('studio');}

// Code Panel
function hideCP(){
  cpOpen=false;
  document.getElementById('cp').style.display='none';
  var b=document.getElementById('ctbtn');
  if(b)b.textContent='< > コードを表示';
}
function showCP(){
  cpOpen=true;
  document.getElementById('cp').style.display='flex';
  document.getElementById('ct').value=cur;
  onCI();
  var b=document.getElementById('ctbtn');
  if(b)b.textContent='< > コードを隠す';
}
function toggleCodePanel(){if(cpOpen)hideCP();else showCP();}
function onCI(){
  var ta=document.getElementById('ct');
  var el=document.querySelector('#ch code');if(!el)return;
  el.textContent=ta.value;
  if(window.Prism)Prism.highlightElement(el);
  var ls=ta.value.split('\n');
  document.getElementById('cl').innerHTML=ls.map(function(_,i){return '<span class="ln">'+(i+1)+'</span>';}).join('');
  document.getElementById('cp-meta').textContent=ls.length+' 行 / '+ta.value.length.toLocaleString()+' 文字';
}
function syncCS(){
  var ta=document.getElementById('ct'),hl=document.getElementById('ch'),ln=document.getElementById('cl');
  hl.scrollTop=ta.scrollTop;hl.scrollLeft=ta.scrollLeft;ln.scrollTop=ta.scrollTop;
}
function ck(e){
  if(e.key==='Tab'){e.preventDefault();var ta=e.target,s=ta.selectionStart,en=ta.selectionEnd;ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en);ta.selectionStart=ta.selectionEnd=s+2;onCI();}
}
function applyCode(){
  cur=document.getElementById('ct').value;
  document.getElementById('sif').srcdoc=cur;
  vers.unshift({id:Date.now(),code:cur,label:'コード編集',type:'manual'});
  renderHist();T('✓ 適用しました');
}

// Device
function setDevice(type){
  curDev=type;
  document.getElementById('dc').className='device-'+type;
  var pw=document.getElementById('pw');
  pw.style.padding=type==='desktop'?'0':'16px';
  ['desktop','tablet','mobile'].forEach(function(d){
    var b=document.getElementById('dev-'+d);
    b.style.background=d===type?'rgba(109,90,239,.3)':'transparent';
    b.style.color=d===type?'white':'var(--t3)';
  });
  var labels={desktop:'',tablet:'タブレット横向き 1024×680',mobile:'スマホ横向き 780×380'};
  var l=document.getElementById('dlbl');l.textContent=labels[type];l.style.display=type==='desktop'?'none':'block';
}

// Fullscreen
function toggleFS(){
  isFsS=!isFsS;
  document.getElementById('wsbar').style.display=isFsS?'none':'flex';
  document.getElementById('aibar').style.display=isFsS?'none':'block';
  document.getElementById('fsexit').style.display=isFsS?'block':'none';
  if(isFsS)hideCP();
}

// History
function toggleHistory(){document.getElementById('hp').classList.toggle('on');}
function renderHist(){
  var b=document.getElementById('hbadge');b.textContent=vers.length;b.style.display=vers.length>1?'inline':'none';
  var tl={ai:'✦',original:'📄',manual:'✏️'};
  document.getElementById('hl').innerHTML=vers.map(function(v,i){
    return '<div class="vc'+(i===0?' cur':'')+'">'+
      '<div class="vt">'+(tl[v.type]||'')+'  '+E(v.label)+'</div>'+
      '<div class="vm"><span class="vtime">'+new Date(v.id).toLocaleTimeString('ja-JP')+'</span>'+
        '<div class="vbs">'+
          '<button class="vb" onclick="restoreV('+i+')">戻す</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}
function restoreV(i){
  cur=vers[i].code;document.getElementById('sif').srcdoc=cur;
  if(cpOpen){document.getElementById('ct').value=cur;onCI();}
  T('「'+vers[i].label+'」に戻しました');
}

// Download
function dlCode(){
  var title=(document.getElementById('shtitle')&&document.getElementById('shtitle').value.trim())||'my-app';
  var b=new Blob([cur],{type:'text/html'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=title.replace(/[^\w\-]/g,'_')+'.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
  T('ダウンロードしました');
}

// Share
function openShareModal(){
  surl='';
  document.getElementById('surlbox').style.display='none';
  document.getElementById('mailbtn').style.display='none';
  document.getElementById('curlbtn').textContent='🔗 URLを作成してコピー';
  document.getElementById('curlbtn').disabled=false;
  document.getElementById('shm').classList.add('on');
}
async function createShareURL(){
  var btn=document.getElementById('curlbtn');btn.disabled=true;btn.textContent='⏳ 生成中...';
  try{
    var title=document.getElementById('shtitle').value.trim()||'無題';
    var ref=await db.collection('apps').add({title:title,code:cur,createdAt:new Date()});
    surl=location.origin+location.pathname+'?id='+ref.id;
    document.getElementById('surl').textContent=surl;
    document.getElementById('surlbox').style.display='block';
    document.getElementById('mailbtn').style.display='block';
    await navigator.clipboard.writeText(surl);
    btn.textContent='✓ コピー済み';T('URLをコピーしました！');
  }catch(e){T('URL作成に失敗しました');btn.disabled=false;btn.textContent='🔗 URLを作成してコピー';}
}
function copyURL(){
  if(!surl)return;
  navigator.clipboard.writeText(surl).then(function(){
    var b=document.getElementById('cpbtn');b.textContent='✓';b.classList.add('done');
    setTimeout(function(){b.textContent='コピー';b.classList.remove('done');},2000);T('コピーしました');
  });
}
function shareEmail(){
  if(!surl)return;
  var t=document.getElementById('shtitle').value.trim()||'無題';
  location.href='mailto:?subject='+encodeURIComponent('[Poteto] '+t)+'&body='+encodeURIComponent(t+'\n\n'+surl);
}
function pubGallery(){
  var title=document.getElementById('shtitle').value.trim()||'無題のアプリ';
  var ex=apps.find(function(a){return a.code===cur;});
  if(ex){ex.title=title;ex.author=prof.name||'';ex.avatar=prof.avatar||'';localStorage.setItem('b44_apps',JSON.stringify(apps));CM('shm');T('上書き保存しました');return;}
  apps.push({id:Date.now(),title:title,code:cur,likes:0,createdAt:Date.now(),author:prof.name||'',avatar:prof.avatar||''});
  localStorage.setItem('b44_apps',JSON.stringify(apps));CM('shm');exitWorkspace();nav('gallery');T('ギャラリーに公開しました！');
}

// Settings
function openSettings(){
  document.getElementById('pname').value=prof.name||'';
  document.getElementById('skey').value=apiKey||'';
  var ks=document.getElementById('kst');ks.textContent=apiKey?('設定済み: '+apiKey.slice(0,8)+'••••••••'):'未設定';
  var img=document.getElementById('avimg');if(prof.avatar){img.src=prof.avatar;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('sm').classList.add('on');
}
function saveSets(){
  prof.name=document.getElementById('pname').value.trim();
  localStorage.setItem('b44_prof',JSON.stringify(prof));
  var val=document.getElementById('skey').value.trim();
  if(val&&!val.startsWith('AIza')){document.getElementById('kst').textContent='形式が正しくありません（AIzaSy...）';document.getElementById('kst').style.color='var(--rd)';return;}
  if(val)apiKey=val;
  CM('sm');T('設定を保存しました');
}
function handleAv(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(ev){prof.avatar=ev.target.result;localStorage.setItem('b44_prof',JSON.stringify(prof));var i=document.getElementById('avimg');i.src=prof.avatar;i.style.display='block';};r.readAsDataURL(f);
}
function toggleKV(){
  var i=document.getElementById('skey'),ic=document.getElementById('keye');
  if(i.type==='password'){i.type='text';ic.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';}
  else{i.type='password';ic.innerHTML='<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';}
}

// AI
var THINKS=['コードを解析中','構造を確認中','修正案を生成中','最適化中','仕上げ中'];
async function callG(prompt){
  if(!apiKey){openSettings();T('先にAPIキーを設定してください');return null;}
  var mi=0;tkTimer=setInterval(function(){document.getElementById('tmsg').textContent=THINKS[mi%THINKS.length];mi++;},1200);
  document.getElementById('thinking').classList.add('on');
  var cfgs=[{v:'v1beta',m:'gemini-2.0-flash'},{v:'v1beta',m:'gemini-1.5-flash'}];
  for(var i=0;i<cfgs.length;i++){
    try{
      var res=await fetch('https://generativelanguage.googleapis.com/'+cfgs[i].v+'/models/'+cfgs[i].m+':generateContent?key='+apiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      var d=await res.json();
      if(res.ok){var c=d.candidates[0].content.parts[0].text.replace(/```html\n?/gi,'').replace(/```\n?/g,'').trim();clearInterval(tkTimer);document.getElementById('thinking').classList.remove('on');return c;}
      if(res.status===400||res.status===403){clearInterval(tkTimer);document.getElementById('thinking').classList.remove('on');T('APIキーエラー: '+((d.error&&d.error.message)||'認証失敗'));return null;}
    }catch(e){console.error(e);}
  }
  clearInterval(tkTimer);document.getElementById('thinking').classList.remove('on');T('生成に失敗しました');return null;
}
async function genFromPrompt(){
  var p=document.getElementById('agi').value.trim();if(!p)return;
  if(!apiKey){openSettings();T('先にAPIキーを設定してください');return;}
  var btn=document.getElementById('agb'),st=document.getElementById('ag-status');
  btn.disabled=true;st.style.display='flex';
  var c=await callG('HTML/CSS/JSを1ファイルにまとめて作成。Markdownのコードブロック記号は不要。HTMLコードのみ出力。\n作るもの: '+p);
  btn.disabled=false;st.style.display='none';
  if(c){startWS(c,p+'（AI生成）','ai');T('生成完了！');}
}
async function runAI(){
  var p=document.getElementById('ai-inp').value.trim();if(!p||!cur)return;
  document.getElementById('ai-snd').disabled=true;
  var c=await callG('以下のHTMLコードを修正。Markdownのコードブロック記号は不要。HTMLコードのみ出力。\n指示: '+p+'\n\nコード:\n'+cur);
  document.getElementById('ai-snd').disabled=false;
  if(c){cur=c;document.getElementById('sif').srcdoc=cur;if(cpOpen){document.getElementById('ct').value=cur;onCI();}vers.unshift({id:Date.now(),code:cur,label:p,type:'ai'});renderHist();document.getElementById('ai-inp').value='';T('AI修正完了！');}
}

// Prism
function loadPrism(){
  if(window.Prism)return;
  var l=document.createElement('link');l.rel='stylesheet';l.href='https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css';document.head.appendChild(l);
  var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js';document.head.appendChild(s);
  var s2=document.createElement('script');s2.src='https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js';s.onload=function(){document.head.appendChild(s2);};
}

// Shared
async function loadShared(){
  var id=new URLSearchParams(location.search).get('id');if(!id)return false;
  T('共有アプリを読み込み中...',4000);
  try{
    var snap=await db.collection('apps').doc(id).get();
    if(snap.exists){
      var d=snap.data();
      document.getElementById('app-ttl').textContent=d.title||'共有されたアプリ';
      document.getElementById('lcnt').textContent='-';
      document.getElementById('app-pv').srcdoc=d.code;
      // navを直接呼ばずにviewを切り替えて確実にコード画面を出さない
      document.querySelectorAll('.view').forEach(function(x){x.classList.remove('active');});
      document.getElementById('view-app').classList.add('active');
      document.getElementById('nbg').style.display='none';
      document.getElementById('nbs').style.display='none';
      return true;
    }
  }catch(e){console.error(e);}
  return false;
}

// Init
window.addEventListener('DOMContentLoaded',async function(){
  loadPrism();
  var loaded=await loadShared();
  if(!loaded)nav('gallery');
});
</script>
