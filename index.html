<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | Pro v14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf-upO8KlxJCg1QijjBOo7Vp9J44zz80M",
            authDomain: "poteto0107-c6aa7.firebaseapp.com",
            projectId: "poteto0107-c6aa7",
            storageBucket: "poteto0107-c6aa7.firebasestorage.app",
            messagingSenderId: "1077874289264",
            appId: "1:1077874289264:web:da6c74c9b49ff49ecda2b5",
            measurementId: "G-STKJDT4Q9Z"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 🌟 改良版：AI生成ロジック ---
        window.generateWithAI = async () => {
            const promptInput = document.getElementById('aiPrompt');
            const prompt = promptInput.value;
            const apiKey = localStorage.getItem('gemini_api_key');
            const btn = document.getElementById('genBtn');

            if (!apiKey) {
                alert("右上の設定（歯車）から、コピーしたAPIキーを保存してください");
                return;
            }
            if (!prompt) return;

            showToast("AIが思考中...");
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            lucide.createIcons();

            try {
                // Gemini API 呼び出し
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ 
                                text: prompt + "。出力はHTML/CSS/JSを1つのファイルにまとめた完成コードのみを返してください。解説やマークダウン(```htmlなど)は一切不要です。" 
                            }] 
                        }]
                    })
                });

                const data = await response.json();

                // エラー時の詳細表示
                if (!response.ok) {
                    const errorMsg = data.error ? data.error.message : "不明なエラー";
                    throw new Error(errorMsg);
                }

                let code = data.candidates[0].content.parts[0].text;
                // 余計な飾り（```html 等）を削る
                code = code.replace(/```html/g, "").replace(/```/g, "").trim();

                document.getElementById('codeInput').value = code;
                window.runApp(false); // 即座に反映（エディタは閉じない）
                showToast("生成が完了しました！");
            } catch (e) {
                console.error(e);
                // ⚠️ ここで具体的なエラー原因をトーストに表示する
                showToast("失敗: " + e.message);
                if(e.message.includes("API key not valid")) {
                    alert("APIキーが間違っているようです。もう一度コピーし直してみてください。");
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = `生成`;
            }
        };

        window.runApp = (forceRemove = true) => {
            const code = document.getElementById('codeInput').value;
            if (!code) return;
            const previewFrame = document.getElementById('preview');
            const doc = previewFrame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
            if (forceRemove) document.getElementById('editorPanel').style.display = 'none';
        };

        window.saveKey = () => {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(!key) return;
            localStorage.setItem('gemini_api_key', key);
            document.getElementById('settingsModal').classList.add('hidden');
            showToast("キーを保存しました！");
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('opacity-100');
            setTimeout(() => toast.classList.remove('opacity-100'), 4000);
        };

        window.addEventListener('load', () => lucide.createIcons());
    </script>
</head>
<body class="h-screen flex flex-col bg-slate-50">

    <nav class="bg-white border-b px-4 py-2 flex justify-between items-center shadow-sm z-30">
        <div class="flex items-center gap-2">
            <span class="text-xl">🚀</span>
            <h1 class="text-sm font-bold text-indigo-600 tracking-tight">AI RUNWAY v14</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('settingsModal').classList.remove('hidden')" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-all">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
            <button onclick="runApp(true)" class="px-4 py-1.5 bg-indigo-600 text-white text-xs font-bold rounded-lg hover:bg-indigo-700">全画面で実行</button>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        <div id="editorPanel" class="w-[380px] h-full bg-slate-900 flex flex-col border-r border-slate-700 shrink-0">
            <div class="p-4 border-b border-slate-700 bg-slate-800">
                <label class="text-[10px] text-slate-400 font-bold uppercase block mb-2">AI Instructions</label>
                <div class="flex gap-2">
                    <input id="aiPrompt" type="text" class="flex-1 bg-slate-700 text-white text-xs p-2 rounded border border-slate-600 focus:outline-none focus:border-indigo-500" placeholder="例：ブロック崩しを作って">
                    <button id="genBtn" onclick="generateWithAI()" class="px-4 py-1 bg-indigo-500 text-white text-xs font-bold rounded hover:bg-indigo-400 transition-colors">生成</button>
                </div>
            </div>
            <div class="flex-1 flex flex-col">
                <div class="bg-slate-800 px-4 py-1.5 text-[10px] text-slate-400 font-bold">SOURCE CODE</div>
                <textarea id="codeInput" class="flex-1 w-full p-4 bg-slate-900 text-indigo-300 font-mono text-[11px] focus:outline-none resize-none" placeholder="AIが生成したコードがここに表示されます"></textarea>
            </div>
        </div>

        <div class="flex-1 h-full bg-white relative">
            <iframe id="preview" class="w-full h-full border-none"></iframe>
        </div>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-[350px]">
            <h2 class="text-xl font-bold mb-2 text-slate-800">Gemini API Key</h2>
            <p class="text-xs text-slate-500 mb-6 leading-relaxed">Google AI Studioでコピーした「AIza...」から始まるキーを貼り付けてください。</p>
            <input id="apiKeyInput" type="password" class="w-full p-3 border border-slate-200 rounded-xl text-sm mb-6 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="APIキーを入力">
            <div class="flex justify-end gap-3">
                <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="px-4 py-2 text-xs font-bold text-slate-400 hover:text-slate-600">キャンセル</button>
                <button onclick="saveKey()" class="px-6 py-2 bg-indigo-600 text-white text-xs font-bold rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">保存して閉じる</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 text-white text-xs rounded-full opacity-0 transition-all duration-300 pointer-events-none z-50 shadow-xl border border-slate-700"></div>

</body>
</html>
