<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Runway v35 | Auto-Load Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@400&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #020617; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }
        #launchPad { position: fixed; inset: 0; background: radial-gradient(circle at top, #1e293b 0%, #020617 100%); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #launchPad.hidden { display: none; }
        .large-editor { width: 100%; max-width: 1000px; height: 60vh; background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 30px; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; transition: all 0.3s; backdrop-filter: blur(10px); }
        #previewContainer { width: 100vw; height: 100vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #aiCommandCenter { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 700px; z-index: 500; }
        #loadingOverlay { position: fixed; inset: 0; background: #020617; z-index: 2000; display: flex; items-center; justify-content: center; transition: opacity 0.5s; }
        #loadingOverlay.fade-out { opacity: 0; pointer-events: none; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSZNHnNcui0Q1VkRshaHEuiMt8wDV2zGk",
            authDomain: "poteto0107-78af7.firebaseapp.com",
            projectId: "poteto0107-78af7",
            storageBucket: "poteto0107-78af7.firebasestorage.app",
            appId: "1:208184037315:web:c220bbc24c600a011bf776"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentCode = "";

        // ページ読み込み時の処理
        window.addEventListener('load', async () => {
            lucide.createIcons();
            const urlParams = new URLSearchParams(window.location.search);
            const appId = urlParams.get('id');

            if (appId) {
                // IDがある場合は読み込み
                try {
                    const docSnap = await getDoc(doc(db, "apps", appId));
                    if (docSnap.exists()) {
                        currentCode = docSnap.data().code;
                        document.getElementById('launchPad').classList.add('hidden');
                        window.renderApp();
                    } else {
                        alert("指定されたデータが見つかりませんでした。");
                    }
                } catch (e) {
                    console.error(e);
                    alert("データの読み込みに失敗しました。");
                }
            }
            document.getElementById('loadingOverlay').classList.add('fade-out');
        });

        window.initApp = () => {
            const code = document.getElementById('initialPaste').value;
            if (!code) return alert("コードを貼り付けてください");
            currentCode = code.replace(/id="editor"|class="editor"|#editor|\.editor/gi, 'style="display:none"')
                             .replace(/#sidebar|#controls|#toolbar/gi, (m) => m + '-hidden');
            document.getElementById('launchPad').classList.add('hidden');
            window.renderApp();
        };

        window.renderApp = () => {
            const iframe = document.getElementById('preview');
            iframe.srcdoc = currentCode;
        };

        // 【改良】共有機能：現在のコードを保存してURLを生成
        window.shareApp = async () => {
            if (!currentCode) return alert("実行中のコードがありません");
            const btn = document.getElementById('shareBtn');
            btn.innerText = "SAVING...";
            try {
                const docRef = await addDoc(collection(db, "apps"), { 
                    code: currentCode, 
                    createdAt: new Date() 
                });
                // 現在のURL（クエリなし）の末尾にIDを付与
                const baseUrl = window.location.origin + window.location.pathname;
                const shareUrl = `${baseUrl}?id=${docRef.id}`;
                
                await navigator.clipboard.writeText(shareUrl);
                alert("共有URLをコピーしました！友達にこのURLを送ってください。");
            } catch (e) {
                console.error(e);
                alert("共有URLの作成に失敗しました。");
            }
            btn.innerText = "SHARE";
        };

        // APIキー設定・AI修正（前回同様）
        window.setApiKey = () => {
            const key = prompt("Gemini APIキーを入力してください:", localStorage.getItem('gemini_api_key') || "");
            if (key !== null) localStorage.setItem('gemini_api_key', key);
        };

        window.iterateWithAI = async () => {
            const key = localStorage.getItem('gemini_api_key') || prompt("Gemini APIキーを入力してください:");
            if (!key) return;
            localStorage.setItem('gemini_api_key', key);

            const promptInput = document.getElementById('aiInput');
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            setLoading(true);
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `プレビューUIを含めず、中身だけを全画面で修正してください。指示：${prompt}\n現在のコード：\n${currentCode}` }] }] })
                });
                const data = await response.json();
                currentCode = data.candidates[0].content.parts[0].text.replace(/```html/gi, "").replace(/```/g, "").trim();
                window.renderApp();
                promptInput.value = "";
            } catch (e) { alert("AI修正に失敗しました。"); }
            setLoading(false);
        };

        const setLoading = (l) => {
            const btn = document.getElementById('aiBtn');
            btn.innerHTML = l ? '<i data-lucide="loader-2" class="animate-spin w-5 h-5"></i>' : '<i data-lucide="sparkles" class="w-5 h-5"></i>';
            lucide.createIcons();
        };
    </script>
</head>
<body>

    <div id="loadingOverlay" class="flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="launchPad">
        <div class="w-full max-w-5xl flex flex-col items-center space-y-6">
            <h1 class="text-3xl font-black italic text-white tracking-tighter uppercase">Runway <span class="text-indigo-500">v35</span></h1>
            <textarea id="initialPaste" class="large-editor" placeholder="HTMLコードを貼り付けてください..."></textarea>
            <button onclick="initApp()" class="w-full max-w-[400px] py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-500 transition-all shadow-2xl">
                START APP
            </button>
        </div>
    </div>

    <div id="previewContainer">
        <iframe id="preview"></iframe>
    </div>

    <div class="fixed top-6 left-6 right-6 flex justify-between items-center pointer-events-none z-[700]">
        <div class="flex gap-3 pointer-events-auto">
            <button onclick="location.reload()" class="glass p-3 text-slate-400 hover:text-white rounded-2xl transition-all"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            <button onclick="setApiKey()" class="glass px-4 py-2 text-[9px] font-bold text-slate-500 hover:text-indigo-400 rounded-xl transition-all uppercase">API Key</button>
        </div>
        <div class="pointer-events-auto">
            <button id="shareBtn" onclick="shareApp()" class="glass px-6 py-2.5 text-[10px] font-black text-indigo-400 hover:text-white rounded-2xl transition-all">SHARE URL</button>
        </div>
    </div>

    <div id="aiCommandCenter">
        <div class="glass p-1.5 rounded-[24px] flex items-center gap-2 shadow-2xl border-white/10">
            <input id="aiInput" type="text" onkeypress="if(event.key==='Enter') iterateWithAI()" class="flex-1 bg-transparent border-none text-sm text-white px-5 py-3.5 outline-none placeholder-slate-600 font-semibold" placeholder="AIに修正を依頼...">
            <button id="aiBtn" onclick="iterateWithAI()" class="bg-indigo-600 hover:bg-indigo-500 text-white w-12 h-12 rounded-[18px] flex items-center justify-center transition-all shadow-lg"><i data-lucide="sparkles" class="w-5 h-5"></i></button>
        </div>
    </div>

</body>
</html>
