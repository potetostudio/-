<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | v27 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f3f4f6; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* サイドバー：初期は非表示 */
        #historyPanel {
            width: 260px;
            margin-left: -260px;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            background: #0f172a;
            border-right: 1px solid #1e293b;
            opacity: 0;
            z-index: 40;
        }
        #historyPanel.visible { margin-left: 0; opacity: 1; }

        /* プレビューエリアの保護（余計なUIを排除） */
        .preview-frame {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 実行ボタンのネオン */
        .btn-run {
            background: #4f46e5;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
        }
        .btn-run:hover {
            background: #6366f1;
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.6);
            transform: scale(1.05);
        }

        /* スクロールバー消し */
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // 🔑 APIキーをここに入れてください
        const HARDCODED_API_KEY = ""; 
        // ==========================================

        const firebaseConfig = {
            apiKey: "AIzaSyBSZNHnNcui0Q1VkRshaHEuiMt8wDV2zGk",
            authDomain: "poteto0107-78af7.firebaseapp.com",
            projectId: "poteto0107-78af7",
            storageBucket: "poteto0107-78af7.firebasestorage.app",
            appId: "1:208184037315:web:c220bbc24c600a011bf776"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 実行：ボタンを押したときのみ動作
        window.runApp = () => {
            const code = document.getElementById('codeInput').value;
            const preview = document.getElementById('preview');
            if (!code) return;
            
            // 実行前に一旦クリアして確実にリロード
            preview.srcdoc = ""; 
            setTimeout(() => {
                preview.srcdoc = code;
                showStatus("実行完了", "emerald");
            }, 50);
        };

        // 修正依頼
        window.iterateWithAI = async () => {
            const prompt = document.getElementById('iteratePrompt').value.trim();
            const currentCode = document.getElementById('codeInput').value.trim();
            if (!prompt) return;

            setLoading(true);
            const fullPrompt = `以下のコードを指示通りに修正してください。解説不要。HTML/CSS/JSをまとめた一つの完結したコードのみ返して。\n\n指示：${prompt}\n\n現在のコード：\n${currentCode}`;

            try {
                const key = HARDCODED_API_KEY || localStorage.getItem('gemini_api_key');
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                });
                const data = await response.json();
                let code = data.candidates[0].content.parts[0].text;
                code = code.replace(/```html/gi, "").replace(/```/g, "").trim();

                document.getElementById('codeInput').value = code;
                // AI修正後は自動で実行せず、ユーザーが確認してから「実行」を押すスタイルに（要望反映）
                showStatus("AI修正完了！「実行」を押して反映", "indigo");
                addToHistory(prompt, code);
                document.getElementById('iteratePrompt').value = '';
            } catch (e) {
                alert("エラーが発生しました。");
            }
            setLoading(false);
        };

        const setLoading = (loading) => {
            const btn = document.getElementById('iterateBtn');
            btn.disabled = loading;
            btn.innerHTML = loading ? '<i data-lucide="loader-2" class="animate-spin w-4 h-4"></i>' : '適用';
            lucide.createIcons();
        };

        const showStatus = (text, color) => {
            const statusEl = document.getElementById('statusText');
            const dot = document.getElementById('statusDot');
            statusEl.innerText = text;
            dot.className = `w-2 h-2 rounded-full bg-${color}-500 animate-pulse`;
        };

        window.toggleHistory = () => document.getElementById('historyPanel').classList.toggle('visible');

        const addToHistory = (prompt, code) => {
            const history = JSON.parse(localStorage.getItem('v27_history') || '[]');
            history.unshift({ id: Date.now(), prompt, code });
            localStorage.setItem('v27_history', JSON.stringify(history.slice(0, 15)));
            renderHistory();
        };

        window.renderHistory = () => {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('v27_history') || '[]');
            list.innerHTML = history.map(h => `
                <div class="p-3 mb-2 rounded-lg bg-slate-800/50 border border-slate-700/30 hover:border-indigo-500 cursor-pointer transition-all" 
                     onclick="document.getElementById('codeInput').value=\`${h.code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`;">
                    <div class="text-white text-[11px] font-bold truncate">${h.prompt}</div>
                    <div class="text-slate-500 text-[9px] mt-1">${new Date(h.id).toLocaleTimeString()}</div>
                </div>
            `).join('');
        };

        window.addEventListener('load', () => { lucide.createIcons(); renderHistory(); });
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="h-16 border-b border-white/5 bg-slate-950 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-6">
            <button onclick="toggleHistory()" class="p-2 hover:bg-white/5 rounded-full text-slate-400">
                <i data-lucide="history" class="w-5 h-5"></i>
            </button>
            <div class="text-xs font-black tracking-[4px] text-indigo-500 uppercase">Runway v27</div>
        </div>

        <div class="flex items-center gap-4">
            <button onclick="window.runApp()" class="btn-run px-8 py-2 rounded-full text-white text-xs font-black uppercase tracking-widest flex items-center gap-2">
                <i data-lucide="play" class="w-4 h-4 fill-current"></i> 実行
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside id="historyPanel" class="flex flex-col">
            <div class="p-6 border-b border-white/5">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">History</h2>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto p-4"></div>
        </aside>

        <section class="w-[500px] flex flex-col bg-[#050a18] border-r border-white/5 shrink-0">
            <div class="px-6 py-3 bg-white/5 flex justify-between items-center">
                <span class="text-[10px] font-bold text-slate-400 mono italic">main.editor</span>
                <div class="flex items-center gap-2">
                    <div id="statusDot" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <span id="statusText" class="text-[9px] text-slate-500 uppercase font-bold">待機中</span>
                </div>
            </div>
            <textarea id="codeInput" 
                class="flex-1 p-8 bg-transparent text-indigo-100 mono text-[13px] leading-relaxed outline-none resize-none"
                placeholder="コードをここに貼り付けてください..."></textarea>

            <div class="p-6 bg-slate-950 border-t border-white/5">
                <div class="relative group">
                    <input id="iteratePrompt" type="text" 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white outline-none focus:border-indigo-500/50 transition-all shadow-2xl" 
                        placeholder="AIに指示を出す（例：背景を動かして）">
                    <button id="iterateBtn" onclick="iterateWithAI()" 
                        class="absolute right-2 top-2 bottom-2 bg-indigo-600 hover:bg-indigo-500 text-white px-6 rounded-xl text-xs font-bold transition-all shadow-lg shadow-indigo-500/20">
                        適用
                    </button>
                </div>
            </div>
        </section>

        <section class="flex-1 bg-[#020617] p-8">
            <iframe id="preview" class="preview-frame"></iframe>
        </section>
    </main>

</body>
</html>
