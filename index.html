<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | v30 TWO-STAGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=JetBrains+Mono:wght@400&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* 初期の貼り付け画面 */
        #launchPad {
            position: fixed; inset: 0; background: #020617; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; transition: all 0.5s ease;
        }
        #launchPad.hidden { opacity: 0; pointer-events: none; transform: translateY(-20px); }

        /* メインレイアウト */
        #mainLayout { display: flex; height: 100vh; width: 100vw; opacity: 0; transition: opacity 0.5s; }
        #mainLayout.visible { opacity: 1; }

        /* エディタの開閉 */
        #editorPanel {
            width: 450px; background: #050a18; border-right: 1px solid #1e293b;
            display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #editorPanel.collapsed { width: 0; border-right: none; }

        /* 履歴 */
        #historyPanel {
            width: 260px; margin-left: -260px; background: #0f172a; border-right: 1px solid #1e293b;
            transition: all 0.4s; opacity: 0;
        }
        #historyPanel.visible { margin-left: 0; opacity: 1; }

        #previewContainer { flex: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        const HARDCODED_API_KEY = ""; // 🔑 キーを入れてください

        // 1. 貼り付け・初期実行
        window.initApp = () => {
            const rawCode = document.getElementById('initialPaste').value;
            if (!rawCode) return alert("コードを貼り付けてください");

            // 余計なエディタUIを消すための簡易クリーニング（正規表現）
            const cleanedCode = rawCode.replace(/id="editor"/g, 'id="old-editor" style="display:none"')
                                      .replace(/class="editor"/g, 'class="old-editor" style="display:none"');

            document.getElementById('editSource').value = cleanedCode;
            document.getElementById('launchPad').classList.add('hidden');
            document.getElementById('mainLayout').classList.add('visible');
            
            window.runApp();
        };

        // 2. 実行
        window.runApp = () => {
            const code = document.getElementById('editSource').value;
            const preview = document.getElementById('preview');
            preview.srcdoc = ""; 
            setTimeout(() => { preview.srcdoc = code; }, 50);
        };

        // 3. AI修正
        window.iterateWithAI = async () => {
            const prompt = document.getElementById('iteratePrompt').value.trim();
            const currentCode = document.getElementById('editSource').value.trim();
            if (!prompt) return;

            setLoading(true);
            const fullPrompt = `以下のHTMLを修正してください。
【重要】プレビュー内にエディタ、境界線、全画面ボタンなどのツールUIは絶対に含めないでください。これらはシステム側で用意されています。純粋なアプリの内容のみを出力してください。
指示：${prompt}
コード：\n${currentCode}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${HARDCODED_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                });
                const data = await response.json();
                let code = data.candidates[0].content.parts[0].text.replace(/```html/gi, "").replace(/```/g, "").trim();

                document.getElementById('editSource').value = code;
                document.getElementById('iteratePrompt').value = '';
            } catch (e) { alert("APIエラー"); }
            setLoading(false);
        };

        window.setLoading = (l) => {
            const btn = document.getElementById('iterateBtn');
            btn.innerHTML = l ? '<i data-lucide="loader-2" class="animate-spin w-4 h-4"></i>' : '適用';
            lucide.createIcons();
        };

        window.toggleEditor = () => document.getElementById('editorPanel').classList.toggle('collapsed');
        window.toggleHistory = () => document.getElementById('historyPanel').classList.toggle('visible');
        window.addEventListener('load', () => { lucide.createIcons(); });
    </script>
</head>
<body>

    <div id="launchPad">
        <div class="max-w-2xl w-full text-center space-y-6">
            <h1 class="text-3xl font-black italic text-indigo-500 uppercase tracking-tighter">AI App Runway v30</h1>
            <p class="text-slate-400 text-sm">他人が作ったコードや、ベースになるコードをここに貼り付けてください</p>
            <textarea id="initialPaste" class="w-full h-64 bg-slate-900 border border-white/10 rounded-2xl p-6 mono text-xs text-indigo-200 outline-none focus:border-indigo-500 transition-all shadow-2xl" placeholder="<html>..."></textarea>
            <button onclick="initApp()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl shadow-lg shadow-indigo-500/20 transition-all uppercase tracking-widest">
                実行して開発を開始する
            </button>
        </div>
    </div>

    <div id="mainLayout">
        <aside id="historyPanel" class="flex flex-col">
            <div class="p-4 border-b border-white/5 text-[10px] font-bold text-slate-500">HISTORY</div>
            <div id="historyList" class="flex-1 overflow-y-auto"></div>
        </aside>

        <section id="editorPanel">
            <div class="h-14 flex items-center justify-between px-4 border-b border-white/5 bg-slate-950">
                <button onclick="toggleHistory()" class="text-slate-500 hover:text-white"><i data-lucide="history" class="w-5 h-5"></i></button>
                <span class="text-[10px] font-bold text-slate-500 mono">EDIT_MODE</span>
                <button onclick="runApp()" class="px-4 py-1.5 bg-indigo-600 text-white text-[10px] font-black rounded-full uppercase">実行</button>
            </div>
            <textarea id="editSource" class="flex-1 p-6 bg-transparent text-indigo-100 mono text-[12px] leading-relaxed outline-none resize-none" placeholder="AI修正専用エディタ..."></textarea>
            
            <div class="p-4 bg-slate-950 border-t border-white/5">
                <div class="relative">
                    <input id="iteratePrompt" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition-all" placeholder="AIに修正を頼む...">
                    <button id="iterateBtn" onclick="iterateWithAI()" class="absolute right-1.5 top-1.5 bottom-1.5 bg-indigo-600 text-white px-4 rounded-lg text-xs font-bold transition-all">適用</button>
                </div>
            </div>
        </section>

        <section id="previewContainer">
            <div class="absolute top-4 left-4 z-10">
                <button onclick="toggleEditor()" class="p-2 glass text-white rounded-lg hover:bg-white/10 transition-all">
                    <i data-lucide="layout" class="w-5 h-5"></i>
                </button>
            </div>
            <iframe id="preview"></iframe>
        </section>
    </div>

</body>
</html>
