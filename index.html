<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | Pro v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf-upO8KlxJCg1QijjBOo7Vp9J44zz80M",
            authDomain: "poteto0107-c6aa7.firebaseapp.com",
            projectId: "poteto0107-c6aa7",
            storageBucket: "poteto0107-c6aa7.firebasestorage.app",
            messagingSenderId: "1077874289264",
            appId: "1:1077874289264:web:da6c74c9b49ff49ecda2b5",
            measurementId: "G-STKJDT4Q9Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 実行ロジック ---
        window.runApp = (autoHide = true) => {
            const code = document.getElementById('codeInput').value;
            const previewFrame = document.getElementById('preview');
            const doc = previewFrame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();

            // 🌟 実行時に自動で隠す設定
            if(autoHide) hideEditor();
        };

        window.shareApp = async () => {
            const code = document.getElementById('codeInput').value;
            if(!code) return;
            showToast("URLを作成中...");
            try {
                const docRef = await addDoc(collection(db, "apps"), { code: code, createdAt: new Date() });
                const shareUrl = window.location.origin + window.location.pathname + '#' + docRef.id;
                await navigator.clipboard.writeText(shareUrl);
                showToast("URLをコピーしました！");
            } catch (e) { showToast("エラーが発生しました。"); }
        };

        window.hideEditor = () => {
            const editor = document.getElementById('editorPanel');
            const toggleBtn = document.getElementById('toggleBtn');
            editor.classList.add('hidden'); // Tailwindのhiddenクラスを使用
            toggleBtn.classList.remove('hidden');
        };

        window.showEditor = () => {
            const editor = document.getElementById('editorPanel');
            const toggleBtn = document.getElementById('toggleBtn');
            editor.classList.remove('hidden');
            toggleBtn.classList.add('hidden');
        };

        window.addEventListener('load', async () => {
            lucide.createIcons();
            const id = window.location.hash.substring(1);
            
            if (id && id.length > 10) {
                // 🌟 【重要】友達がリンクから入った時の挙動
                const docSnap = await getDoc(doc(db, "apps", id));
                if (docSnap.exists()) {
                    document.getElementById('codeInput').value = docSnap.data().code;
                    // 最初からエディタを隠して実行
                    hideEditor();
                    runApp(true); 
                }
            }
        });

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('opacity-100');
            setTimeout(() => toast.classList.remove('opacity-100'), 3000);
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #0f172a; margin: 0; }
        #preview { background: white; width: 100%; height: 100%; border: none; }
        /* アニメーションを少し滑らかに */
        #editorPanel { transition: all 0.3s ease; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="bg-white border-b border-slate-200 px-4 py-2 flex justify-between items-center shadow-sm z-30">
        <div class="flex items-center gap-2">
            <span class="text-xl">🚀</span>
            <h1 class="text-sm font-bold text-indigo-600">AI App Runway</h1>
        </div>
        
        <div class="flex gap-2">
            <button id="toggleBtn" onclick="showEditor()" class="hidden px-3 py-1.5 text-xs font-bold bg-slate-800 text-white rounded-lg flex items-center gap-1 hover:bg-slate-700">
                <i data-lucide="settings" class="w-3.5 h-3.5"></i> 編集モード
            </button>

            <button onclick="shareApp()" class="px-3 py-1.5 text-xs font-bold bg-indigo-50 text-indigo-600 rounded-lg flex items-center gap-1">
                <i data-lucide="link-2" class="w-3.5 h-3.5"></i> URL発行
            </button>
            
            <button onclick="runApp(true)" class="px-5 py-1.5 bg-indigo-600 text-white text-xs font-bold rounded-lg hover:bg-indigo-700">
                反映
            </button>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        
        <div id="editorPanel" class="w-[400px] h-full bg-slate-900 flex flex-col border-r border-slate-700 shrink-0">
            <div class="bg-slate-800 px-4 py-2 text-[10px] text-slate-400 font-bold">貼り付け専用エディタ</div>
            <textarea id="codeInput" 
                class="flex-1 w-full p-4 bg-slate-900 text-indigo-300 font-mono text-sm focus:outline-none resize-none"
                placeholder="AIのコードを貼り付けて「反映」を押してね"></textarea>
        </div>

        <div class="flex-1 h-full bg-white relative">
            <iframe id="preview" title="App Content"></iframe>
        </div>

    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 text-white text-xs rounded-full opacity-0 transition-all duration-300 pointer-events-none z-50"></div>

</body>
</html>
