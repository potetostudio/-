<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | Pro v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf-upO8KlxJCg1QijjBOo7Vp9J44zz80M",
            authDomain: "poteto0107-c6aa7.firebaseapp.com",
            projectId: "poteto0107-c6aa7",
            storageBucket: "poteto0107-c6aa7.firebasestorage.app",
            messagingSenderId: "1077874289264",
            appId: "1:1077874289264:web:da6c74c9b49ff49ecda2b5",
            measurementId: "G-STKJDT4Q9Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 実行ロジック ---
        window.runApp = (shouldDestroy = true) => {
            const codeInput = document.getElementById('codeInput');
            if (!codeInput) return; // すでに削除済みの場合は何もしない

            const code = codeInput.value;
            const previewFrame = document.getElementById('preview');
            const doc = previewFrame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();

            // 🌟 物理的に搬入口を削除する
            if(shouldDestroy) {
                const editorPanel = document.getElementById('editorPanel');
                if (editorPanel) {
                    editorPanel.remove(); // DOMから完全に消去
                }
            }
        };

        window.shareApp = async () => {
            // 物理削除後は codeInput がないので、iframeの中身を取得するか、変数を保存しておく必要があります
            // 今回はシンプルにするため、削除前に保存していたコードを使用する設計にします
            const code = document.getElementById('codeInput')?.value || window.lastCode;
            if(!code) return;
            showToast("URLを作成中...");
            try {
                const docRef = await addDoc(collection(db, "apps"), { code: code, createdAt: new Date() });
                const shareUrl = window.location.origin + window.location.pathname + '#' + docRef.id;
                await navigator.clipboard.writeText(shareUrl);
                showToast("URLをコピーしました！");
            } catch (e) { showToast("エラーが発生しました。"); }
        };

        window.addEventListener('load', async () => {
            lucide.createIcons();
            const id = window.location.hash.substring(1);
            
            if (id && id.length > 10) {
                // 🌟 友達がリンクから入った時
                const docSnap = await getDoc(doc(db, "apps", id));
                if (docSnap.exists()) {
                    const code = docSnap.data().code;
                    window.lastCode = code; // バックアップ
                    // エディタにセットして即座に削除実行
                    const input = document.getElementById('codeInput');
                    input.value = code;
                    runApp(true); // 物理削除して実行
                }
            }
        });

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('opacity-100');
            setTimeout(() => toast.classList.remove('opacity-100'), 3000);
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #ffffff; margin: 0; }
        #preview { background: white; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="bg-white border-b border-slate-200 px-4 py-2 flex justify-between items-center z-30">
        <div class="flex items-center gap-2">
            <span class="text-xl">🚀</span>
            <h1 class="text-sm font-bold text-indigo-600">AI App Runway</h1>
        </div>
        
        <div class="flex gap-2">
            <button onclick="shareApp()" class="px-3 py-1.5 text-xs font-bold bg-indigo-50 text-indigo-600 rounded-lg flex items-center gap-1">
                <i data-lucide="link-2" class="w-3.5 h-3.5"></i> URL発行
            </button>
            <button onclick="runApp(true)" class="px-5 py-1.5 bg-indigo-600 text-white text-xs font-bold rounded-lg hover:bg-indigo-700">
                反映して全画面化
            </button>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden bg-white">
        
        <div id="editorPanel" class="w-[350px] h-full bg-slate-100 flex flex-col border-r border-slate-200 shrink-0">
            <div class="bg-slate-200 px-4 py-2 text-[10px] text-slate-500 font-bold">CODE IMPORTER</div>
            <textarea id="codeInput" 
                class="flex-1 w-full p-4 bg-white text-slate-700 font-mono text-xs focus:outline-none resize-none border-none"
                placeholder="AIが作った2画面エディタコードをここに貼り付けてください..."></textarea>
        </div>

        <div class="flex-1 h-full relative">
            <iframe id="preview" title="Main Content"></iframe>
        </div>

    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 text-white text-xs rounded-full opacity-0 transition-all duration-300 pointer-events-none z-50"></div>

</body>
</html>
