<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | Pro v12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        (function() {
            if (window.location.hash.length > 10) {
                // 共有リンクの場合、以下のスタイルを即座に適用して搬入口を抹消する
                const style = document.createElement('style');
                style.innerHTML = `
                    #editorPanel { display: none !important; width: 0 !important; }
                    #runBtn { display: none !important; }
                `;
                document.head.appendChild(style);
            }
        })();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf-upO8KlxJCg1QijjBOo7Vp9J44zz80M",
            authDomain: "poteto0107-c6aa7.firebaseapp.com",
            projectId: "poteto0107-c6aa7",
            storageBucket: "poteto0107-c6aa7.firebasestorage.app",
            messagingSenderId: "1077874289264",
            appId: "1:1077874289264:web:da6c74c9b49ff49ecda2b5",
            measurementId: "G-STKJDT4Q9Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.cachedCode = "";

        // --- 実行ロジック ---
        window.runApp = (codeToRun = null) => {
            const input = document.getElementById('codeInput');
            const targetCode = codeToRun || (input ? input.value : window.cachedCode);
            
            if (!targetCode || targetCode.trim() === "") return;
            window.cachedCode = targetCode;

            const previewFrame = document.getElementById('preview');
            const doc = previewFrame.contentWindow.document;
            doc.open();
            doc.write(targetCode);
            doc.close();

            // 物理的に削除
            const panel = document.getElementById('editorPanel');
            if (panel) panel.remove();
            
            const runBtn = document.getElementById('runBtn');
            if (runBtn) runBtn.remove();
        };

        window.shareApp = async () => {
            const input = document.getElementById('codeInput');
            const codeToSave = input ? input.value : window.cachedCode;
            if(!codeToSave) { showToast("コードがありません"); return; }
            showToast("URLを作成中...");
            try {
                const docRef = await addDoc(collection(db, "apps"), { code: codeToSave, createdAt: new Date() });
                const shareUrl = window.location.origin + window.location.pathname + '#' + docRef.id;
                await navigator.clipboard.writeText(shareUrl);
                showToast("URLをコピーしました！");
            } catch (e) { showToast("保存に失敗しました"); }
        };

        // 🌟 起動時の処理
        window.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            const id = window.location.hash.substring(1);

            if (id && id.length > 10) {
                try {
                    const docSnap = await getDoc(doc(db, "apps", id));
                    if (docSnap.exists()) {
                        const code = docSnap.data().code;
                        window.runApp(code);
                    }
                } catch (e) {
                    console.error("Firebase Error:", e);
                }
            }
        });

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('opacity-100');
            setTimeout(() => toast.classList.remove('opacity-100'), 3000);
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #ffffff; margin: 0; }
        #preview { background: white; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="bg-white border-b border-slate-200 px-4 py-2 flex justify-between items-center z-30">
        <div class="flex items-center gap-2">
            <span class="text-xl">🚀</span>
            <h1 class="text-sm font-bold text-indigo-600">AI App Runway</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="shareApp()" class="px-3 py-1.5 text-xs font-bold bg-indigo-50 text-indigo-600 rounded-lg flex items-center gap-1 hover:bg-indigo-100 transition-all">
                <i data-lucide="link-2" class="w-3.5 h-3.5"></i> URL発行
            </button>
            <button id="runBtn" onclick="runApp()" class="px-5 py-1.5 bg-indigo-600 text-white text-xs font-bold rounded-lg hover:bg-indigo-700">
                反映
            </button>
        </div>
    </nav>

    <main id="mainArea" class="flex-1 flex overflow-hidden bg-white">
        <div id="editorPanel" class="w-[350px] h-full bg-slate-900 flex flex-col border-r border-slate-700 shrink-0">
            <div class="bg-slate-800 px-4 py-2 text-[10px] text-slate-400 font-bold tracking-widest">IMPORTER</div>
            <textarea id="codeInput" 
                class="flex-1 w-full p-4 bg-slate-900 text-indigo-300 font-mono text-xs focus:outline-none resize-none"
                placeholder="コードを貼り付けて反映を押してください"></textarea>
        </div>

        <div class="flex-1 h-full">
            <iframe id="preview" title="App Preview"></iframe>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 text-white text-xs rounded-full opacity-0 transition-all duration-300 pointer-events-none z-50"></div>

</body>
</html>
