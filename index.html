<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | v25 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }

        /* サイドバーアニメーション */
        #historyPanel {
            width: 240px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
        }
        #historyPanel.collapsed {
            width: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateX(-20px);
        }

        /* プレビューエリア */
        .preview-mobile { 
            max-width: 375px !important; height: 667px !important;
            margin: auto !important; border: 12px solid #1e293b !important; 
            border-radius: 36px !important;
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* ネオンエフェクト */
        .neon-border:focus-within {
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.4);
            border-color: #6366f1 !important;
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // 🔑 APIキーをここに直接入れてください
        const HARDCODED_API_KEY = ""; 
        // ==========================================

        const firebaseConfig = {
            apiKey: "AIzaSyBSZNHnNcui0Q1VkRshaHEuiMt8wDV2zGk",
            authDomain: "poteto0107-78af7.firebaseapp.com",
            projectId: "poteto0107-78af7",
            storageBucket: "poteto0107-78af7.firebasestorage.app",
            appId: "1:208184037315:web:c220bbc24c600a011bf776"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // API実行
        const callGemini = async (promptText) => {
            const key = HARDCODED_API_KEY || localStorage.getItem('gemini_api_key');
            if (!key) { alert("APIキーが設定されていません。コード内のHARDCODED_API_KEYに記入してください。"); return null; }
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                const data = await response.json();
                let code = data.candidates[0].content.parts[0].text;
                return code.replace(/```html/gi, "").replace(/```/g, "").trim();
            } catch (e) { console.error(e); return null; }
        };

        // 修正
        window.iterateWithAI = async () => {
            const prompt = document.getElementById('iteratePrompt').value.trim();
            const currentCode = document.getElementById('codeInput').value.trim();
            if (!prompt) return;

            setLoading(true);
            const fullPrompt = `【重要】HTML/CSS/JSコードのみを返してください。解説不要。\n\n指示：${prompt}\n\n現在のコード：\n${currentCode}`;
            const code = await callGemini(fullPrompt);
            
            if (code) {
                document.getElementById('codeInput').value = code;
                window.runApp();
                addToHistory(prompt, code);
                document.getElementById('iteratePrompt').value = '';
            }
            setLoading(false);
        };

        const setLoading = (loading) => {
            const btn = document.getElementById('iterateBtn');
            const status = document.getElementById('statusText');
            btn.disabled = loading;
            btn.innerHTML = loading ? '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>' : '適用';
            status.innerText = loading ? 'AIが思考中...' : '準備完了';
            lucide.createIcons();
        };

        window.runApp = () => {
            const code = document.getElementById('codeInput').value;
            const preview = document.getElementById('preview');
            const doc = preview.contentWindow.document;
            doc.open(); doc.write(code); doc.close();
        };

        // UI操作
        window.toggleHistory = () => {
            document.getElementById('historyPanel').classList.toggle('collapsed');
        };

        window.toggleDevice = () => {
            document.getElementById('preview').classList.toggle('preview-mobile');
        };

        window.downloadCode = () => {
            const code = document.getElementById('codeInput').value;
            const blob = new Blob([code], { type: 'text/html' });
            const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'ai-app.html' });
            a.click();
        };

        window.createShareUrl = async () => {
            const code = document.getElementById('codeInput').value;
            if (!code) return;
            const docRef = await addDoc(collection(db, "apps"), { code, createdAt: new Date() });
            navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?id=${docRef.id}`);
            alert("共有URLをコピーしました！");
        };

        const addToHistory = (prompt, code) => {
            const history = JSON.parse(localStorage.getItem('v25_history') || '[]');
            history.unshift({ id: Date.now(), prompt, code });
            localStorage.setItem('v25_history', JSON.stringify(history.slice(0, 15)));
            renderHistory();
        };

        window.renderHistory = () => {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('v25_history') || '[]');
            list.innerHTML = history.map(h => `
                <div class="p-3 mb-2 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-indigo-500 cursor-pointer transition-all" 
                     onclick="document.getElementById('codeInput').value=\`${h.code.replace(/`/g, '\\`')}\`;window.runApp();">
                    <div class="text-white text-[11px] font-semibold truncate">${h.prompt}</div>
                    <div class="text-slate-500 text-[9px] mt-1">${new Date(h.id).toLocaleTimeString()}</div>
                </div>
            `).join('');
        };

        window.addEventListener('load', () => { lucide.createIcons(); renderHistory(); });
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-[#020617] text-slate-300">

    <nav class="h-14 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-4">
            <button onclick="toggleHistory()" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400">
                <i data-lucide="history" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-indigo-500 rounded-full animate-pulse"></div>
                <span class="font-bold text-white tracking-tighter text-sm">RUNWAY v25 <span class="text-indigo-400">PRO</span></span>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button onclick="toggleDevice()" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400" title="スマホサイズ表示">
                <i data-lucide="smartphone" class="w-5 h-5"></i>
            </button>
            <button onclick="downloadCode()" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400" title="HTMLを保存">
                <i data-lucide="download" class="w-5 h-5"></i>
            </button>
            <button onclick="createShareUrl()" class="mx-2 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold rounded-lg transition-all">
                URL作成
            </button>
            <button onclick="document.getElementById('editorPanel').style.display = 'none'" class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold rounded-lg shadow-lg shadow-indigo-500/20">
                全画面
            </button>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        <aside id="historyPanel" class="flex flex-col border-r border-slate-800">
            <div class="p-4 flex items-center justify-between">
                <span class="text-[10px] font-black uppercase tracking-[2px] text-slate-500">History</span>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto px-4 pb-4">
                </div>
        </aside>

        <section id="editorPanel" class="w-[450px] flex flex-col bg-slate-900/30 border-r border-slate-800 shrink-0">
            <div class="flex-1 flex flex-col min-h-0">
                <div class="px-4 py-2 bg-slate-800/40 text-[10px] font-bold text-slate-500 flex justify-between">
                    <span>SOURCE CODE</span>
                    <span class="text-indigo-400">READ/WRITE</span>
                </div>
                <textarea id="codeInput" 
                    class="flex-1 p-5 bg-transparent text-indigo-200 mono text-[12px] leading-relaxed outline-none resize-none"
                    placeholder="ここにコードを入力、またはAIに修正指示を出してください..."></textarea>
            </div>

            <div class="p-4 bg-[#0f172a] border-t border-slate-800">
                <div class="flex items-center gap-2 mb-3">
                    <div class="bg-emerald-500/10 p-1 rounded">
                        <i data-lucide="wand-2" class="w-3 h-3 text-emerald-400"></i>
                    </div>
                    <span class="text-[10px] font-bold text-emerald-400 tracking-wider uppercase">AI Editor</span>
                </div>
                <div class="flex gap-2 neon-border bg-slate-800 rounded-xl p-1 border border-slate-700 transition-all">
                    <input id="iteratePrompt" type="text" 
                        class="flex-1 bg-transparent border-none text-sm text-white px-3 py-2 outline-none" 
                        placeholder="例：デザインをサイバーパンク風にして">
                    <button id="iterateBtn" onclick="iterateWithAI()" 
                        class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all flex items-center justify-center min-w-[60px]">
                        適用
                    </button>
                </div>
            </div>
        </section>

        <section class="flex-1 bg-[#020617] flex flex-col relative">
            <div class="absolute inset-0 flex items-center justify-center p-8 overflow-hidden">
                <iframe id="preview" class="w-full h-full bg-white shadow-2xl transition-all duration-500 ease-in-out rounded-lg overflow-hidden"></iframe>
            </div>
            
            <div class="absolute bottom-4 left-4 right-4 h-8 bg-slate-900/80 backdrop-blur border border-slate-700/50 rounded-full flex items-center px-4 justify-between pointer-events-none">
                <div class="flex items-center gap-2">
                    <div id="statusDot" class="w-2 h-2 bg-emerald-500 rounded-full"></div>
                    <span id="statusText" class="text-[10px] font-medium text-slate-400">システム正常</span>
                </div>
                <span class="text-[9px] text-slate-600 mono uppercase tracking-widest">Live Preview Active</span>
            </div>
        </section>
    </main>

</body>
</html>
