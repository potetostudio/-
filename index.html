<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | DB版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf-upO8KlxJCg1QijjBOo7Vp9J44zz80M",
            authDomain: "poteto0107-c6aa7.firebaseapp.com",
            projectId: "poteto0107-c6aa7",
            storageBucket: "poteto0107-c6aa7.firebasestorage.app",
            messagingSenderId: "1077874289264",
            appId: "1:1077874289264:web:da6c74c9b49ff49ecda2b5",
            measurementId: "G-STKJDT4Q9Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.runApp = () => {
            const code = document.getElementById('codeInput').value;
            const previewFrame = document.getElementById('preview');
            const doc = previewFrame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
        };

        window.shareApp = async () => {
            const code = document.getElementById('codeInput').value;
            if(!code) return;
            showToast("URLを作成中...");

            try {
                const docRef = await addDoc(collection(db, "apps"), {
                    code: code,
                    createdAt: new Date()
                });
                const shareUrl = window.location.origin + window.location.pathname + '#' + docRef.id;
                await navigator.clipboard.writeText(shareUrl);
                showToast("短いURLをコピーしたよ！そのままSNSに貼れます。");
            } catch (e) {
                console.error("保存エラー:", e);
                showToast("保存に失敗しました。");
            }
        };

        // 🌟 新機能：アプリモードとエディタモードの切り替え
        window.setAppMode = (isApp) => {
            const topNav = document.getElementById('topNav');
            const editorPanel = document.getElementById('editorPanel');
            const mainArea = document.getElementById('mainArea');
            const editBtn = document.getElementById('editBtn');
            const preview = document.getElementById('preview');

            if (isApp) {
                // アプリモード（全画面）
                topNav.style.display = 'none';
                editorPanel.style.display = 'none';
                mainArea.classList.remove('p-4', 'gap-4');
                mainArea.classList.add('p-0');
                preview.style.borderRadius = '0';
                preview.style.boxShadow = 'none';
                editBtn.style.display = 'block'; // 右下の編集ボタンを表示
            } else {
                // エディタモード
                topNav.style.display = 'flex';
                editorPanel.style.display = 'flex';
                mainArea.classList.add('p-4', 'gap-4');
                mainArea.classList.remove('p-0');
                preview.style.borderRadius = '12px';
                preview.style.boxShadow = '0 4px 20px rgba(0,0,0,0.1)';
                editBtn.style.display = 'none';
            }
        };

        window.addEventListener('load', async () => {
            lucide.createIcons();
            const id = window.location.hash.substring(1);
            
            if (id && id.length > 10) {
                // 【重要】URLにIDがある時は、全画面のアプリモードにする
                setAppMode(true);
                showToast("アプリを読み込み中...");
                try {
                    const docSnap = await getDoc(doc(db, "apps", id));
                    if (docSnap.exists()) {
                        document.getElementById('codeInput').value = docSnap.data().code;
                        runApp();
                    } else {
                        showToast("アプリが見つかりませんでした。");
                        setAppMode(false);
                        runApp();
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                // 普通に開いた時はエディタを表示
                setAppMode(false);
                runApp();
            }
        });

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('opacity-100');
            setTimeout(() => toast.classList.remove('opacity-100'), 3000);
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; }
        #preview { background: white; transition: all 0.3s ease; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-slate-900">

    <nav id="topNav" class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center gap-2">
            <span class="text-xl">🚀</span>
            <h1 class="text-lg font-bold text-indigo-600 tracking-tight">AI App Runway</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="shareApp()" class="px-4 py-2 text-sm font-semibold bg-indigo-50 text-indigo-600 rounded-full flex items-center gap-1 hover:bg-indigo-100 transition-all">
                <i data-lucide="link-2" class="w-4 h-4"></i> 短いURLを発行
            </button>
            <button onclick="runApp()" class="px-6 py-2 bg-indigo-600 text-white text-sm font-bold rounded-full hover:bg-indigo-700 shadow-md transition-all active:scale-95">
                アプリを起動
            </button>
        </div>
    </nav>

    <main id="mainArea" class="flex-1 flex flex-col md:flex-row p-4 gap-4 overflow-hidden relative">
        
        <div id="editorPanel" class="flex flex-col flex-1 z-10">
            <textarea id="codeInput" 
                class="flex-1 w-full p-4 rounded-xl border border-slate-200 bg-slate-900 text-slate-200 font-mono text-sm focus:outline-none"
                placeholder="ここにAIコードを貼り付け...">

    <div style="text-align:center; background:white; padding:40px; border-radius:30px; box-shadow:0 20px 25px rgba(0,0,0,0.1);">
        <h1 style="color:#4f46e5; margin-bottom:10px;">📱 全画面アプリ化！</h1>

        <div id="previewPanel" class="flex-1 flex bg-white w-full h-full relative z-0">
            <iframe id="preview" class="w-full h-full border-none"></iframe>

    </main>

    <button id="editBtn" onclick="setAppMode(false)" class="fixed bottom-6 right-6 px-4 py-2 bg-slate-800/80 backdrop-blur text-white text-xs font-bold rounded-full shadow-lg hover:bg-slate-700 transition-all hidden z-50">

    </button>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 text-white text-sm rounded-full opacity-0 transition-all duration-300 pointer-events-none z-50"></div>
