<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI App Runway | v29 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* サイドバー：初期は非表示 */
        #historyPanel {
            width: 260px; margin-left: -260px; opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: #0f172a; border-right: 1px solid #1e293b; z-index: 50;
        }
        #historyPanel.visible { margin-left: 0; opacity: 1; }

        /* エディタ：折りたたみ時に完全に消える */
        #editorPanel {
            width: 480px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: #050a18; border-right: 1px solid #1e293b; overflow: hidden;
            display: flex; flex-direction: column;
        }
        #editorPanel.collapsed { width: 0; border-right: none; }

        /* プレビュー：全画面時は余白ゼロ */
        #previewContainer { flex: 1; transition: all 0.4s ease; background: #000; position: relative; }
        #previewContainer.fullscreen { padding: 0 !important; }
        
        iframe { width: 100%; height: 100%; border: none; background: #fff; display: block; }

        /* ボタンアニメーション */
        .btn-run {
            background: #4f46e5; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: all 0.2s; border: none; cursor: pointer;
        }
        .btn-run:hover { background: #6366f1; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5); }
        .btn-run:active { transform: translateY(0); }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // 🔑 APIキーをここに直接入れてください
        const HARDCODED_API_KEY = ""; 
        // ==========================================

        const firebaseConfig = {
            apiKey: "AIzaSyBSZNHnNcui0Q1VkRshaHEuiMt8wDV2zGk",
            authDomain: "poteto0107-78af7.firebaseapp.com",
            projectId: "poteto0107-78af7",
            storageBucket: "poteto0107-78af7.firebasestorage.app",
            appId: "1:208184037315:web:c220bbc24c600a011bf776"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 実行：既存の内容をクリアしてから書き込む
        window.runApp = () => {
            const code = document.getElementById('codeInput').value;
            const preview = document.getElementById('preview');
            if (!code) return;
            
            preview.srcdoc = ""; // クリア
            setTimeout(() => {
                preview.srcdoc = code;
                updateStatus("実行中", "emerald");
            }, 50);
        };

        // AIへの命令（以前のトラブルを踏まえた強化版プロンプト）
        window.iterateWithAI = async () => {
            const prompt = document.getElementById('iteratePrompt').value.trim();
            const currentCode = document.getElementById('codeInput').value.trim();
            if (!prompt) return;

            setLoading(true);
            const fullPrompt = `以下の指示に従ってHTML/CSS/JSコードを修正してください。

【厳格命令：以前発生したUI重複問題を防止せよ】
1. プレビュー画面内に「エディタ」「境界線」「コード表示ボタン」「全画面切り替えUI」などを絶対に作らないでください。
2. それらのツール機能は外側のシステム（Runway）が担当します。あなたのコードに含めるとUIが二重になり、重大なエラーとなります。
3. 純粋にアプリ/ゲームの中身（コンテンツ）だけを、一つのHTMLファイルとして出力してください。解説は不要です。

【ユーザー指示】
${prompt}

【現在のコード】
${currentCode}`;

            try {
                const key = HARDCODED_API_KEY || localStorage.getItem('gemini_api_key');
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                });
                const data = await response.json();
                let code = data.candidates[0].content.parts[0].text;
                code = code.replace(/```html/gi, "").replace(/```/g, "").trim();

                document.getElementById('codeInput').value = code;
                updateStatus("AI修正完了（実行を押して下さい）", "indigo");
                addToHistory(prompt, code);
                document.getElementById('iteratePrompt').value = '';
            } catch (e) {
                console.error(e);
                alert("エラーが発生しました。");
            }
            setLoading(false);
        };

        const setLoading = (loading) => {
            const btn = document.getElementById('iterateBtn');
            btn.disabled = loading;
            btn.innerHTML = loading ? '<i data-lucide="loader-2" class="animate-spin w-4 h-4"></i>' : '適用';
            lucide.createIcons();
        };

        const updateStatus = (text, color) => {
            document.getElementById('statusText').innerText = text;
            document.getElementById('statusDot').className = `w-2 h-2 rounded-full bg-${color}-500 animate-pulse`;
        };

        window.toggleHistory = () => document.getElementById('historyPanel').classList.toggle('visible');

        // エディタを隠してプレビューを真の全画面にする
        window.toggleEditor = () => {
            const editor = document.getElementById('editorPanel');
            const container = document.getElementById('previewContainer');
            const btnText = document.getElementById('toggleText');
            
            const isCollapsing = !editor.classList.contains('collapsed');
            
            editor.classList.toggle('collapsed');
            container.classList.toggle('fullscreen', isCollapsing);
            btnText.innerText = isCollapsing ? "エディタを出す" : "エディタを隠す";
        };

        const addToHistory = (prompt, code) => {
            const history = JSON.parse(localStorage.getItem('v29_history') || '[]');
            history.unshift({ id: Date.now(), prompt, code });
            localStorage.setItem('v29_history', JSON.stringify(history.slice(0, 15)));
            renderHistory();
        };

        window.renderHistory = () => {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('v29_history') || '[]');
            list.innerHTML = history.map(h => `
                <div class="p-3 mb-2 rounded-lg bg-slate-800/50 border border-slate-700/30 hover:border-indigo-500 cursor-pointer transition-all" 
                     onclick="document.getElementById('codeInput').value=\`${h.code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`;">
                    <div class="text-white text-[11px] font-bold truncate">${h.prompt}</div>
                    <div class="text-slate-500 text-[9px] mt-1">${new Date(h.id).toLocaleTimeString()}</div>
                </div>
            `).join('');
        };

        window.addEventListener('load', () => { lucide.createIcons(); renderHistory(); });
    </script>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="h-14 border-b border-white/5 bg-slate-950 flex items-center justify-between px-4 z-50 shadow-xl">
        <div class="flex items-center gap-4">
            <button onclick="toggleHistory()" class="p-2 hover:bg-white/10 rounded-lg text-slate-400">
                <i data-lucide="history" class="w-5 h-5"></i>
            </button>
            <div class="text-[10px] font-black tracking-[3px] text-indigo-500 uppercase">Runway v29</div>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="toggleEditor()" class="flex items-center gap-2 px-4 py-1.5 bg-slate-800 hover:bg-slate-700 text-white text-[11px] font-bold rounded-lg transition-all border border-white/5">
                <i data-lucide="layout" class="w-3.5 h-3.5"></i>
                <span id="toggleText">エディタを隠す</span>
            </button>
            
            <button onclick="window.runApp()" class="btn-run px-8 py-1.5 rounded-full text-white text-[11px] font-black uppercase tracking-widest flex items-center gap-2">
                <i data-lucide="play" class="w-3.5 h-3.5 fill-current"></i> 実行
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside id="historyPanel" class="flex flex-col">
            <div class="p-4 border-b border-white/5 bg-slate-900/50">
                <h2 class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Versions</h2>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto p-3"></div>
        </aside>

        <section id="editorPanel">
            <div class="px-4 py-2 bg-white/5 flex justify-between items-center border-b border-white/5">
                <span class="text-[9px] font-bold text-slate-500 mono">EDITOR / SOURCE</span>
                <div class="flex items-center gap-2">
                    <div id="statusDot" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <span id="statusText" class="text-[9px] text-slate-500 font-black uppercase">Ready</span>
                </div>
            </div>
            <textarea id="codeInput" 
                class="flex-1 p-6 bg-transparent text-indigo-100 mono text-[12px] leading-relaxed outline-none resize-none"
                placeholder="コードを貼り付けるか指示を出してください..."></textarea>

            <div class="p-4 bg-slate-950 border-t border-white/5 shadow-2xl">
                <div class="relative">
                    <input id="iteratePrompt" type="text" 
                        class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-indigo-500/50 transition-all placeholder-slate-600 shadow-inner" 
                        placeholder="例：画面いっぱいに星を降らせて">
                    <button id="iterateBtn" onclick="iterateWithAI()" 
                        class="absolute right-1.5 top-1.5 bottom-1.5 bg-indigo-600 hover:bg-indigo-500 text-white px-5 rounded-lg text-xs font-bold transition-all">
                        適用
                    </button>
                </div>
            </div>
        </section>

        <section id="previewContainer" class="p-6">
            <iframe id="preview" class="rounded-lg shadow-2xl overflow-hidden"></iframe>
        </section>
    </main>

</body>
</html>
