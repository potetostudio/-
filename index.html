<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Runway v33 | Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@400&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; background: #020617; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }

        /* 貼り付け画面（LaunchPad）を画面いっぱいに */
        #launchPad {
            position: fixed; inset: 0; background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        #launchPad.hidden { display: none; }

        /* テキストエリアを最大化 */
        .large-editor {
            width: 100%; max-width: 1000px; height: 65vh; /* 画面の65%の高さ */
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 30px; color: #e2e8f0; font-family: 'JetBrains Mono', monospace;
            font-size: 13px; line-height: 1.6; outline: none; transition: all 0.3s;
            backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .large-editor:focus { border-color: #6366f1; background: rgba(15, 23, 42, 0.8); }

        /* メインプレビュー */
        #previewContainer { width: 100vw; height: 100vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* ガラスUI */
        .glass {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 修正指示バー */
        #aiCommandCenter {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 700px; z-index: 500;
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const HARDCODED_API_KEY = ""; 

        const firebaseConfig = {
            apiKey: "AIzaSyBSZNHnNcui0Q1VkRshaHEuiMt8wDV2zGk",
            authDomain: "poteto0107-78af7.firebaseapp.com",
            projectId: "poteto0107-78af7",
            storageBucket: "poteto0107-78af7.firebasestorage.app",
            appId: "1:208184037315:web:c220bbc24c600a011bf776"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentCode = "";

        // APIキー取得ロジックの修正
        const getApiKey = () => {
            if (HARDCODED_API_KEY) return HARDCODED_API_KEY;
            let savedKey = localStorage.getItem('gemini_api_key');
            if (!savedKey || savedKey === "null") {
                savedKey = prompt("Gemini APIキーを入力してください（ブラウザに保存されます）:");
                if (savedKey) {
                    localStorage.setItem('gemini_api_key', savedKey);
                } else {
                    alert("APIキーがないとAI修正機能が使えません。");
                }
            }
            return savedKey;
        };

        // 初期実行
        window.initApp = () => {
            const code = document.getElementById('initialPaste').value;
            if (!code) return alert("コードを貼り付けてください");
            
            // 強制クリーニング
            currentCode = code.replace(/id="editor"|class="editor"/gi, 'style="display:none"')
                             .replace(/#sidebar|#controls/gi, (m) => m + '-off');
            
            document.getElementById('launchPad').classList.add('hidden');
            window.renderApp();
            
            // 実行後にAPIキーを確認（必要ならここで聞く）
            getApiKey();
        };

        window.renderApp = () => {
            document.getElementById('preview').srcdoc = currentCode;
        };

        window.shareApp = async () => {
            if (!currentCode) return;
            const btn = document.getElementById('shareBtn');
            btn.innerText = "SAVING...";
            try {
                const docRef = await addDoc(collection(db, "apps"), { code: currentCode, createdAt: new Date() });
                const shareUrl = `${window.location.origin}${window.location.pathname}?id=${docRef.id}`;
                await navigator.clipboard.writeText(shareUrl);
                alert("共有URLをコピーしました！");
                btn.innerText = "SHARE";
            } catch (e) { alert("保存失敗"); btn.innerText = "SHARE"; }
        };

        window.iterateWithAI = async () => {
            const promptInput = document.getElementById('aiInput');
            const prompt = promptInput.value.trim();
            const key = getApiKey();
            if (!prompt || !key) return;

            setLoading(true);
            const fullPrompt = `以下のHTMLを指示通り修正。
【絶対】プレビュー内にエディタUIや境界線、重複ボタンを一切作らないで。中身のゲーム画面だけを100%全画面で実装して。
指示：${prompt}
現在のコード：\n${currentCode}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                });
                const data = await response.json();
                currentCode = data.candidates[0].content.parts[0].text.replace(/```html/gi, "").replace(/```/g, "").trim();
                window.renderApp();
                promptInput.value = "";
            } catch (e) { alert("APIエラーが発生しました。キーを確認してください。"); }
            setLoading(false);
        };

        const setLoading = (l) => {
            const btn = document.getElementById('aiBtn');
            btn.innerHTML = l ? '<i data-lucide="loader-2" class="animate-spin w-5 h-5"></i>' : '<i data-lucide="sparkles" class="w-5 h-5"></i>';
            lucide.createIcons();
        };

        window.clearApiKey = () => {
            localStorage.removeItem('gemini_api_key');
            alert("キーをリセットしました。再読み込みします。");
            location.reload();
        };

        window.addEventListener('load', () => { lucide.createIcons(); });
    </script>
</head>
<body>

    <div id="launchPad">
        <div class="w-full max-w-5xl flex flex-col items-center space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-black italic text-white tracking-tighter">RUNWAY <span class="text-indigo-500">v33</span></h1>
                <p class="text-slate-400 text-[10px] uppercase tracking-[4px] mt-2">Professional Code Injector</p>
            </div>
            
            <textarea id="initialPaste" class="large-editor" placeholder="ここにベースとなるコードを貼り付けてください..."></textarea>
            
            <button onclick="initApp()" class="w-full max-w-[400px] py-4 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-500 transition-all shadow-2xl shadow-indigo-500/40 uppercase tracking-widest text-sm">
                LAUNCH APPLICATION
            </button>
        </div>
    </div>

    <div id="previewContainer">
        <iframe id="preview"></iframe>
    </div>

    <div class="fixed top-6 left-6 right-6 flex justify-between items-center pointer-events-none z-[700]">
        <div class="flex gap-3 pointer-events-auto">
            <button onclick="location.reload()" class="glass p-3 text-slate-400 hover:text-white rounded-2xl transition-all">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
            <button onclick="clearApiKey()" class="glass px-4 py-2 text-[9px] font-bold text-slate-500 hover:text-red-400 rounded-xl transition-all">
                API KEY RESET
            </button>
        </div>
        <div class="pointer-events-auto">
            <button id="shareBtn" onclick="shareApp()" class="glass px-6 py-2.5 text-[10px] font-black text-indigo-400 hover:text-white rounded-2xl transition-all tracking-widest">
                SHARE
            </button>
        </div>
    </div>

    <div id="aiCommandCenter">
        <div class="glass p-1.5 rounded-[24px] flex items-center gap-2 shadow-2xl border-white/10">
            <input id="aiInput" type="text" 
                onkeypress="if(event.key==='Enter') iterateWithAI()"
                class="flex-1 bg-transparent border-none text-sm text-white px-5 py-3.5 outline-none placeholder-slate-500 font-semibold" 
                placeholder="AIに指示（例：今のUIを全て消して全画面にして）">
            <button id="aiBtn" onclick="iterateWithAI()" 
                class="bg-indigo-600 hover:bg-indigo-500 text-white w-12 h-12 rounded-[18px] flex items-center justify-center transition-all shadow-lg">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

</body>
</html>
